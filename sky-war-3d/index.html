<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sky War 3D — germ.fun</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #020510; font-family: 'Plus Jakarta Sans', sans-serif; }

    #canvas { display: block; width: 100%; height: 100%; }

    /* ── HUD ─────────────────────────────────────── */
    #hud {
      position: fixed; inset: 0; pointer-events: none; z-index: 10;
      display: grid;
      grid-template-areas: "p1   timer  p2"
                           ".    .      ."
                           "ctrl msg    ctrl2";
      grid-template-columns: 1fr auto 1fr;
      grid-template-rows: auto 1fr auto;
      padding: 16px;
      gap: 8px;
    }

    .hud-panel {
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(8px);
      border-radius: 12px;
      padding: 10px 14px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    /* Player panels */
    .p-panel { display: flex; flex-direction: column; gap: 4px; }
    .p-panel.p1 { grid-area: p1; }
    .p-panel.p2 { grid-area: p2; text-align: right; align-items: flex-end; }

    .p-name {
      font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: rgba(255,255,255,0.5);
    }
    .p-plane-name { font-size: 13px; font-weight: 600; }
    .p-score { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; color: #fff; }

    .health-bar-wrap {
      width: 140px; height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px; overflow: hidden;
    }
    .p-panel.p2 .health-bar-wrap { margin-left: auto; }
    .health-bar {
      height: 100%; border-radius: 4px;
      transition: width 0.2s ease, background 0.3s ease;
    }
    .health-bar.p1-bar { background: #00d4ff; }
    .health-bar.p2-bar { background: #ff6b35; }

    .special-pips { display: flex; gap: 4px; margin-top: 4px; }
    .p-panel.p2 .special-pips { flex-direction: row-reverse; }
    .pip {
      width: 10px; height: 10px; border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.2);
      transition: background 0.15s ease;
    }
    .pip.ready { background: #ffd700; border-color: #ffd700; box-shadow: 0 0 6px #ffd700; }

    /* Timer */
    #hud-timer {
      grid-area: timer;
      align-self: start;
      justify-self: center;
      text-align: center;
      min-width: 100px;
    }
    .round-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; color: rgba(255,255,255,0.4); text-transform: uppercase; }
    .timer-display { font-size: 32px; font-weight: 800; letter-spacing: -0.04em; color: #fff; }
    .timer-display.low { color: #ff4444; animation: timerPulse 0.5s ease infinite; }
    @keyframes timerPulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

    /* Control hints */
    #ctrl-p1 { grid-area: ctrl; align-self: end; font-size: 10px; color: rgba(255,255,255,0.3); }
    #ctrl-p2 { grid-area: ctrl2; align-self: end; text-align: right; font-size: 10px; color: rgba(255,255,255,0.3); }
    .ctrl-row { display: flex; gap: 8px; margin-top: 2px; flex-wrap: wrap; }
    #ctrl-p2 .ctrl-row { justify-content: flex-end; }
    .key-badge {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px; padding: 1px 5px; font-family: monospace; font-size: 10px;
      color: rgba(255,255,255,0.5);
    }

    /* Kill feed */
    #kill-feed {
      position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      pointer-events: none; z-index: 11;
    }
    .kill-msg {
      background: rgba(0,0,0,0.7); border-radius: 8px; padding: 4px 14px;
      font-size: 13px; font-weight: 600; color: #fff;
      animation: killFadeIn 0.2s ease forwards, killFadeOut 0.5s ease 2s forwards;
    }
    @keyframes killFadeIn  { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes killFadeOut { from{opacity:1} to{opacity:0} }

    /* ── Overlay screens ─────────────────────────── */
    .screen {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(2,5,16,0.92);
      backdrop-filter: blur(12px);
      gap: 16px;
    }
    .screen.hidden { display: none; }

    .screen-logo {
      font-size: 14px; font-weight: 700; letter-spacing: 0.1em;
      color: rgba(255,255,255,0.3); text-transform: uppercase;
      margin-bottom: -8px;
    }
    .screen-logo a { color: inherit; text-decoration: none; }
    .screen-title {
      font-size: clamp(36px, 6vw, 60px);
      font-weight: 800; letter-spacing: -0.04em;
      color: #fff; text-align: center;
    }
    .screen-title span { color: #00d4ff; }
    .screen-subtitle {
      font-size: 15px; color: rgba(255,255,255,0.5); text-align: center;
    }

    /* Mode selector */
    .mode-grid {
      display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
      margin-top: 8px; max-width: 600px;
    }
    .mode-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px; padding: 16px 24px;
      cursor: pointer; color: #fff; font-family: inherit;
      display: flex; flex-direction: column; gap: 4px; align-items: center;
      min-width: 150px; transition: all 0.2s ease;
      pointer-events: all;
    }
    .mode-btn:hover {
      background: rgba(0,212,255,0.12);
      border-color: rgba(0,212,255,0.4);
      transform: translateY(-3px);
    }
    .mode-btn .mode-icon { font-size: 28px; }
    .mode-btn .mode-label { font-size: 15px; font-weight: 700; }
    .mode-btn .mode-desc { font-size: 11px; color: rgba(255,255,255,0.45); text-align: center; }

    /* Plane picker */
    #plane-picker { max-width: 700px; width: 100%; padding: 0 20px; }
    .picker-header { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
    .plane-options {
      display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
    }
    .plane-opt {
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 10px; padding: 10px 14px;
      cursor: pointer; color: #fff; font-family: inherit;
      display: flex; flex-direction: column; gap: 2px;
      min-width: 100px; transition: all 0.2s ease;
      pointer-events: all; background: rgba(255,255,255,0.04);
    }
    .plane-opt:hover { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.08); }
    .plane-opt.selected { border-color: #00d4ff; background: rgba(0,212,255,0.12); }
    .plane-opt .p-opt-name { font-size: 13px; font-weight: 700; }
    .plane-opt .p-opt-stats { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
    .stat-bar-row { display: flex; align-items: center; gap: 4px; }
    .stat-label { font-size: 9px; color: rgba(255,255,255,0.35); width: 28px; text-align: right; }
    .stat-track { width: 36px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow:hidden; }
    .stat-fill  { height: 100%; border-radius: 2px; background: #00d4ff; transition: width 0.3s ease; }

    .big-btn {
      background: #00d4ff; color: #000; font-family: inherit;
      font-size: 16px; font-weight: 800; letter-spacing: 0.04em;
      border: none; border-radius: 12px; padding: 14px 40px;
      cursor: pointer; pointer-events: all;
      transition: all 0.2s ease;
    }
    .big-btn:hover { background: #33ddff; transform: scale(1.04); }
    .big-btn.secondary { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: #fff; }
    .big-btn.secondary:hover { background: rgba(255,255,255,0.14); }

    /* Round end */
    #round-end .winner-text { font-size: 48px; font-weight: 800; letter-spacing: -0.04em; }
    #round-end .final-scores { display: flex; gap: 24px; align-items: center; font-size: 20px; color: rgba(255,255,255,0.7); }
    #round-end .final-scores strong { color: #fff; font-size: 32px; }

    /* Pause */
    #pause-screen .pause-btns { display: flex; flex-direction: column; gap: 10px; min-width: 240px; }

    /* FPS counter */
    #fps {
      position: fixed; bottom: 8px; right: 12px; z-index: 20;
      font-size: 10px; color: rgba(255,255,255,0.2);
      font-family: monospace; pointer-events: none;
    }

    .back-btn {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      z-index: 200; pointer-events: all;
    }
    .back-btn a {
      font-size: 12px; font-weight: 700; letter-spacing: 0.06em;
      color: rgba(255,255,255,0.3); text-transform: uppercase;
      text-decoration: none; transition: color 0.2s;
    }
    .back-btn a:hover { color: rgba(255,255,255,0.7); }

    @media (max-width: 500px) {
      .mode-btn { min-width: 120px; padding: 12px 16px; }
      .plane-opt { min-width: 80px; }
    }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>

<!-- HUD (visible during gameplay) -->
<div id="hud" class="hidden">
  <!-- P1 panel -->
  <div class="hud-panel p-panel p1">
    <div class="p-name">Player 1</div>
    <div class="p-plane-name" id="p1-plane-name" style="color:#00d4ff">Scout</div>
    <div class="p-score" id="p1-score">0</div>
    <div class="health-bar-wrap"><div class="health-bar p1-bar" id="p1-hp" style="width:100%"></div></div>
    <div class="special-pips" id="p1-pips">
      <div class="pip ready"></div><div class="pip ready"></div><div class="pip"></div>
    </div>
  </div>

  <!-- Timer -->
  <div class="hud-panel" id="hud-timer">
    <div class="round-label">Round <span id="round-num">1</span></div>
    <div class="timer-display" id="timer">2:00</div>
  </div>

  <!-- P2 panel -->
  <div class="hud-panel p-panel p2">
    <div class="p-name">Player 2</div>
    <div class="p-plane-name" id="p2-plane-name" style="color:#ff6b35">Fighter</div>
    <div class="p-score" id="p2-score">0</div>
    <div class="health-bar-wrap"><div class="health-bar p2-bar" id="p2-hp" style="width:100%"></div></div>
    <div class="special-pips" id="p2-pips">
      <div class="pip ready"></div><div class="pip ready"></div><div class="pip"></div>
    </div>
  </div>

  <!-- Control hints -->
  <div id="ctrl-p1">
    <div>WASD · Move</div>
    <div class="ctrl-row">
      <span class="key-badge">Space</span> Shoot
      <span class="key-badge">Tab</span> Special
    </div>
  </div>
  <div id="ctrl-p2">
    <div>Arrow Keys · Move</div>
    <div class="ctrl-row">
      <span class="key-badge">Ctrl</span> Shoot
      <span class="key-badge">Alt</span> Special
    </div>
  </div>
</div>

<!-- Kill feed -->
<div id="kill-feed"></div>

<!-- Back button -->
<div class="back-btn hidden" id="back-btn">
  <a href="../">← germ.fun</a>
</div>

<!-- ── MAIN MENU ── -->
<div class="screen" id="menu-screen">
  <div class="screen-logo"><a href="../">← germ.fun</a></div>
  <h1 class="screen-title">Sky War <span>3D</span></h1>
  <p class="screen-subtitle">5 tipe pesawat. Dogfight udara dari atas.</p>
  <div class="mode-grid">
    <button class="mode-btn" data-mode="1v1">
      <span class="mode-icon">⚔️</span>
      <span class="mode-label">1v1 Local</span>
      <span class="mode-desc">2 pemain, 1 keyboard</span>
    </button>
    <button class="mode-btn" data-mode="1vb">
      <span class="mode-icon">🤖</span>
      <span class="mode-label">vs Bot</span>
      <span class="mode-desc">Kamu vs AI</span>
    </button>
    <button class="mode-btn" data-mode="2vb">
      <span class="mode-icon">🤝</span>
      <span class="mode-label">2P vs Bots</span>
      <span class="mode-desc">Co-op lawan bot</span>
    </button>
  </div>
</div>

<!-- ── PLANE PICKER ── -->
<div class="screen hidden" id="picker-screen">
  <h2 class="screen-title" style="font-size:clamp(24px,4vw,40px)">Pilih <span>Pesawat</span></h2>
  <div id="plane-picker">
    <div class="picker-header" id="picker-for">Player 1 — pilih pesawat</div>
    <div class="plane-options" id="plane-opts"></div>
  </div>
  <div style="display:flex;gap:12px;margin-top:8px">
    <button class="big-btn secondary" id="picker-back">← Back</button>
    <button class="big-btn" id="picker-confirm">Confirm →</button>
  </div>
</div>

<!-- ── ROUND END ── -->
<div class="screen hidden" id="round-end">
  <div class="winner-text" id="winner-text">Player 1 Wins!</div>
  <div class="final-scores">
    <span>P1 <strong id="re-p1">0</strong></span>
    <span style="color:rgba(255,255,255,0.3)">—</span>
    <span>P2 <strong id="re-p2">0</strong></span>
  </div>
  <div style="display:flex;gap:12px;margin-top:8px">
    <button class="big-btn" id="btn-next-round">Next Round</button>
    <button class="big-btn secondary" id="btn-main-menu">Main Menu</button>
  </div>
</div>

<!-- ── PAUSE ── -->
<div class="screen hidden" id="pause-screen">
  <h2 class="screen-title" style="font-size:36px">Paused</h2>
  <div class="pause-btns">
    <button class="big-btn" id="btn-resume">Resume</button>
    <button class="big-btn secondary" id="btn-pause-menu">Main Menu</button>
  </div>
</div>

<div id="fps">0 fps</div>

<script type="module">
import * as THREE from 'three';

// ══════════════════════════════════════════════════════
// QUALITY DETECTION
// ══════════════════════════════════════════════════════
const Q = (() => {
  let gpuTier = 2;
  try {
    const c = document.createElement('canvas');
    const gl = c.getContext('webgl');
    if (gl) {
      const ext = gl.getExtension('WEBGL_debug_renderer_info');
      if (ext) {
        const r = gl.getParameter(ext.UNMASKED_RENDERER_WEBGL).toLowerCase();
        if (/swiftshader|llvmpipe|microsoft basic/.test(r)) gpuTier = 0;
        else if (/intel hd [345]|mali-4|adreno [23]/.test(r)) gpuTier = 1;
        else if (/nvidia|radeon|geforce/.test(r)) gpuTier = 3;
      }
    }
  } catch (_) {}
  const cores = navigator.hardwareConcurrency ?? 2;
  const score = gpuTier * 3 + (cores >= 8 ? 2 : cores >= 4 ? 1 : 0);
  if (score <= 2) return { id:'POTATO', pr:0.5, shadows:false, mat:'basic', particles:30 };
  if (score <= 4) return { id:'LOW',    pr:0.75,shadows:false, mat:'lambert',particles:100 };
  if (score <= 7) return { id:'MEDIUM', pr:1.0, shadows:true,  mat:'phong',  particles:300 };
  return             { id:'HIGH',   pr:Math.min(devicePixelRatio,2), shadows:true, mat:'standard', particles:500 };
})();

// ══════════════════════════════════════════════════════
// PLANE DEFINITIONS
// ══════════════════════════════════════════════════════
const PLANE_DEFS = [
  {
    id: 'scout', name: 'Scout', color: 0x00d4ff,
    hp: 60, speed: 18, turnRate: 2.8, fireRate: 8, bulletDmg: 12,
    special: 'boost', desc: 'Cepat & lincah. HP rendah.',
    stats: { speed: 5, armor: 1, firepower: 3, agility: 5 }
  },
  {
    id: 'fighter', name: 'Fighter', color: 0xff6b35,
    hp: 100, speed: 13, turnRate: 2.0, fireRate: 6, bulletDmg: 15,
    special: 'barrage', desc: 'Seimbang. Pilihan terbaik pemula.',
    stats: { speed: 3, armor: 3, firepower: 3, agility: 3 }
  },
  {
    id: 'heavy', name: 'Heavy', color: 0xcccccc,
    hp: 200, speed: 9, turnRate: 1.2, fireRate: 3, bulletDmg: 30,
    special: 'shield', desc: 'Lambat tapi tanky. Satu tembakan sakit.',
    stats: { speed: 1, armor: 5, firepower: 4, agility: 1 }
  },
  {
    id: 'bomber', name: 'Bomber', color: 0x8bc34a,
    hp: 120, speed: 11, turnRate: 1.5, fireRate: 2, bulletDmg: 60,
    special: 'bomb', desc: 'Tembak jarang tapi area damage.',
    stats: { speed: 2, armor: 3, firepower: 5, agility: 2 }
  },
  {
    id: 'stealth', name: 'Stealth', color: 0x9b59b6,
    hp: 70, speed: 15, turnRate: 2.4, fireRate: 7, bulletDmg: 14,
    special: 'cloak', desc: 'Bisa menghilang sebentar.',
    stats: { speed: 4, armor: 2, firepower: 3, agility: 4 }
  },
];

// ══════════════════════════════════════════════════════
// PROCEDURAL PLANE GEOMETRY
// ══════════════════════════════════════════════════════
function makeMaterial(color, tier) {
  const c = new THREE.Color(color);
  if (tier === 'basic')    return new THREE.MeshBasicMaterial({ color: c });
  if (tier === 'lambert')  return new THREE.MeshLambertMaterial({ color: c });
  if (tier === 'standard') return new THREE.MeshStandardMaterial({ color: c, metalness: 0.6, roughness: 0.4 });
  return new THREE.MeshPhongMaterial({ color: c, shininess: 80 });
}

function buildPlane(def) {
  const g = new THREE.Group();
  const mat  = makeMaterial(def.color, Q.mat);
  const matD = makeMaterial(new THREE.Color(def.color).multiplyScalar(0.6), Q.mat);

  // Body (fuselage) — elongated box
  const bodyW = def.id === 'heavy' ? 0.55 : def.id === 'bomber' ? 0.5 : 0.35;
  const bodyL = def.id === 'heavy' ? 2.8 : def.id === 'bomber' ? 3.2 : 2.4;
  const bodyMesh = new THREE.Mesh(new THREE.BoxGeometry(bodyW, 0.28, bodyL), mat);
  g.add(bodyMesh);

  // Nose (cone at front)
  const nose = new THREE.Mesh(new THREE.ConeGeometry(bodyW * 0.5, 0.8, 4), mat);
  nose.rotation.x = Math.PI / 2;
  nose.position.z = -(bodyL / 2 + 0.35);
  g.add(nose);

  // Wings
  const wingSpan   = def.id === 'heavy' ? 5.0 : def.id === 'bomber' ? 5.5 : def.id === 'scout' ? 3.2 : 4.0;
  const wingDepth  = def.id === 'stealth' ? 2.8 : 1.8;
  const wingThick  = 0.08;

  // Left wing
  const wingGeo = new THREE.BoxGeometry(wingSpan / 2, wingThick, wingDepth);
  const lWing = new THREE.Mesh(wingGeo, matD);
  lWing.position.set(-wingSpan / 4 - bodyW / 2 + 0.1, 0, 0);
  if (def.id === 'stealth') lWing.rotation.y = -0.25;
  g.add(lWing);

  // Right wing (mirror)
  const rWing = lWing.clone();
  rWing.position.x = wingSpan / 4 + bodyW / 2 - 0.1;
  if (def.id === 'stealth') rWing.rotation.y = 0.25;
  g.add(rWing);

  // Tail fins
  const tailV = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.6, 0.7), matD);
  tailV.position.set(0, 0.3, bodyL / 2 - 0.2);
  g.add(tailV);

  const tailH = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.08, 0.7), matD);
  tailH.position.set(0, 0, bodyL / 2 - 0.3);
  g.add(tailH);

  // Engine glow (visible from above)
  const glowGeo = new THREE.CircleGeometry(0.25, 8);
  const glowMat = new THREE.MeshBasicMaterial({ color: def.color, transparent: true, opacity: 0.9 });
  const glow = new THREE.Mesh(glowGeo, glowMat);
  glow.rotation.x = -Math.PI / 2;
  glow.position.set(0, 0.15, bodyL / 2 - 0.1);
  g.add(glow);

  // The plane faces -Z (forward)
  // Rotate group so "forward" is +X for intuitive angle math
  g.rotation.y = Math.PI / 2;

  return g;
}

// ══════════════════════════════════════════════════════
// BULLET POOL
// ══════════════════════════════════════════════════════
class BulletPool {
  constructor(scene) {
    this.scene = scene;
    this.pool  = [];
    this.alive = [];
    for (let i = 0; i < 80; i++) this._create();
  }
  _create() {
    const mesh = new THREE.Mesh(
      new THREE.SphereGeometry(0.12, 4, 4),
      new THREE.MeshBasicMaterial({ color: 0xffffff })
    );
    mesh.visible = false;
    this.scene.add(mesh);
    this.pool.push({ mesh, vx:0, vz:0, dmg:10, owner:-1, life:0, maxLife:2 });
  }
  fire(x, z, angle, speed, dmg, owner, color) {
    let b = this.pool.pop();
    if (!b) { this._create(); b = this.pool.pop(); }
    b.mesh.visible = true;
    b.mesh.position.set(x, 0.1, z);
    b.mesh.material.color.setHex(color);
    b.mesh.scale.setScalar(owner === 0 ? 1 : 1.2); // bombers bigger
    b.vx = Math.cos(angle) * speed;
    b.vz = Math.sin(angle) * speed;
    b.dmg = dmg;
    b.owner = owner;
    b.life = 0;
    b.maxLife = 2.5;
    this.alive.push(b);
    return b;
  }
  update(dt) {
    for (let i = this.alive.length - 1; i >= 0; i--) {
      const b = this.alive[i];
      b.mesh.position.x += b.vx * dt;
      b.mesh.position.z += b.vz * dt;
      b.life += dt;
      if (b.life >= b.maxLife) { this._kill(i); }
      else if (Math.abs(b.mesh.position.x) > 110 || Math.abs(b.mesh.position.z) > 110) { this._kill(i); }
    }
  }
  _kill(i) {
    const b = this.alive.splice(i, 1)[0];
    b.mesh.visible = false;
    this.pool.push(b);
  }
  releaseAll() {
    while (this.alive.length) this._kill(0);
  }
}

// ══════════════════════════════════════════════════════
// PARTICLE SYSTEM
// ══════════════════════════════════════════════════════
class Particles {
  constructor(scene, maxCount) {
    this.max = maxCount;
    this.pos = new Float32Array(maxCount * 3);
    this.vel = new Float32Array(maxCount * 3);
    this.life= new Float32Array(maxCount);
    this.maxLife = new Float32Array(maxCount);
    this.colors  = new Float32Array(maxCount * 3);
    this.count = 0;

    this.geo = new THREE.BufferGeometry();
    this.geo.setAttribute('position', new THREE.BufferAttribute(this.pos, 3));
    this.geo.setAttribute('color', new THREE.BufferAttribute(this.colors, 3));
    this.mat = new THREE.PointsMaterial({ size: 0.3, vertexColors: true, transparent: true, sizeAttenuation: true });
    this.pts = new THREE.Points(this.geo, this.mat);
    scene.add(this.pts);
  }
  emit(x, z, count, color) {
    const c = new THREE.Color(color);
    for (let i = 0; i < count; i++) {
      if (this.count >= this.max) break;
      const n = this.count++;
      const i3 = n * 3;
      this.pos[i3]   = x; this.pos[i3+1] = 0.2; this.pos[i3+2] = z;
      const a = Math.random() * Math.PI * 2;
      const sp = 1 + Math.random() * 8;
      this.vel[i3]   = Math.cos(a) * sp;
      this.vel[i3+1] = Math.random() * 4;
      this.vel[i3+2] = Math.sin(a) * sp;
      this.life[n]   = 0;
      this.maxLife[n]= 0.6 + Math.random() * 0.8;
      this.colors[i3]   = c.r + Math.random() * 0.2;
      this.colors[i3+1] = c.g;
      this.colors[i3+2] = c.b;
    }
  }
  update(dt) {
    for (let n = this.count - 1; n >= 0; n--) {
      this.life[n] += dt;
      if (this.life[n] >= this.maxLife[n]) {
        // swap with last
        const last = this.count - 1;
        const n3 = n * 3, l3 = last * 3;
        for (let k = 0; k < 3; k++) {
          this.pos[n3+k]    = this.pos[l3+k];
          this.vel[n3+k]    = this.vel[l3+k];
          this.colors[n3+k] = this.colors[l3+k];
        }
        this.life[n] = this.life[last];
        this.maxLife[n] = this.maxLife[last];
        this.count--;
        continue;
      }
      const i3 = n * 3;
      this.pos[i3]   += this.vel[i3]   * dt;
      this.pos[i3+1] += this.vel[i3+1] * dt;
      this.pos[i3+2] += this.vel[i3+2] * dt;
      this.vel[i3+1] -= 8 * dt; // gravity
    }
    this.geo.setDrawRange(0, this.count);
    this.geo.attributes.position.needsUpdate = true;
    this.geo.attributes.color.needsUpdate = true;
    this.mat.opacity = 1;
  }
}

// ══════════════════════════════════════════════════════
// TRAIL SYSTEM (per plane)
// ══════════════════════════════════════════════════════
class Trail {
  constructor(scene, color, maxLen = 30) {
    this.maxLen  = maxLen;
    this.points  = [];
    const geo = new THREE.BufferGeometry();
    this.posArr = new Float32Array(maxLen * 3);
    geo.setAttribute('position', new THREE.BufferAttribute(this.posArr, 3));
    const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.45 });
    this.line = new THREE.Line(geo, mat);
    scene.add(this.line);
  }
  add(x, z) {
    this.points.unshift({ x, y: 0.12, z });
    if (this.points.length > this.maxLen) this.points.pop();
    for (let i = 0; i < this.points.length; i++) {
      const i3 = i * 3;
      this.posArr[i3]   = this.points[i].x;
      this.posArr[i3+1] = this.points[i].y;
      this.posArr[i3+2] = this.points[i].z;
    }
    this.line.geometry.setDrawRange(0, this.points.length);
    this.line.geometry.attributes.position.needsUpdate = true;
  }
  clear() { this.points = []; this.line.geometry.setDrawRange(0, 0); }
}

// ══════════════════════════════════════════════════════
// BOT AI
// ══════════════════════════════════════════════════════
class BotAI {
  constructor(planeIndex, targets) {
    this.planeIndex = planeIndex; // which player slot this bot controls
    this.targets = targets;       // array of other PlaneState
    this.state = 'PATROL';
    this.stateTimer = 0;
    this.patrolAngle = Math.random() * Math.PI * 2;
    this.patrolChangeTimer = 0;
  }

  update(self, dt) {
    const target = this.targets.find(t => t !== self && t.alive);
    if (!target) { this.state = 'PATROL'; }

    this.stateTimer += dt;

    const dist = target ? Math.hypot(target.x - self.x, target.z - self.z) : 999;

    // State transitions
    if (target) {
      if (dist < 8 && self.hp < 40) this.state = 'EVADE';
      else if (dist < 50) this.state = dist < 20 ? 'ATTACK' : 'CHASE';
      else this.state = 'PATROL';
    }

    const input = { thrust: false, left: false, right: false, fire: false, special: false };

    if (this.state === 'PATROL') {
      this.patrolChangeTimer -= dt;
      if (this.patrolChangeTimer <= 0) {
        this.patrolAngle = Math.random() * Math.PI * 2;
        this.patrolChangeTimer = 2 + Math.random() * 3;
      }
      // Steer toward patrol angle
      const desiredAngle = this.patrolAngle;
      const diff = _angleDiff(self.angle, desiredAngle);
      if (Math.abs(diff) > 0.1) { diff > 0 ? input.right = true : input.left = true; }
      input.thrust = true;
      // Stay in bounds
      if (Math.abs(self.x) > 85 || Math.abs(self.z) > 85) {
        const awayAngle = Math.atan2(-self.z, -self.x);
        const ad = _angleDiff(self.angle, awayAngle);
        if (Math.abs(ad) > 0.1) { ad > 0 ? input.right = true : input.left = true; }
      }
    } else if (this.state === 'CHASE' || this.state === 'ATTACK') {
      if (target) {
        const angleToTarget = Math.atan2(target.z - self.z, target.x - self.x);
        const diff = _angleDiff(self.angle, angleToTarget);
        if (Math.abs(diff) > 0.08) { diff > 0 ? input.right = true : input.left = true; }
        input.thrust = true;
        if (this.state === 'ATTACK' && Math.abs(diff) < 0.3 && dist < 25) input.fire = true;
        if (Math.random() < 0.005) input.special = true;
      }
    } else if (this.state === 'EVADE') {
      if (target) {
        const awayAngle = Math.atan2(self.z - target.z, self.x - target.x);
        const diff = _angleDiff(self.angle, awayAngle);
        if (Math.abs(diff) > 0.1) { diff > 0 ? input.right = true : input.left = true; }
        input.thrust = true;
      }
    }

    return input;
  }
}

function _angleDiff(from, to) {
  let d = to - from;
  while (d >  Math.PI) d -= Math.PI * 2;
  while (d < -Math.PI) d += Math.PI * 2;
  return d;
}

// ══════════════════════════════════════════════════════
// ARENA BUILDER
// ══════════════════════════════════════════════════════
function buildArena(scene) {
  // Ground plane
  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(220, 220),
    new THREE.MeshLambertMaterial({ color: 0x0a1520 })
  );
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -0.5;
  scene.add(ground);

  // Grid lines on ground
  const gridHelper = new THREE.GridHelper(200, 20, 0x112233, 0x0d1a26);
  gridHelper.position.y = -0.48;
  scene.add(gridHelper);

  // Floating islands / obstacles
  const islandPositions = [
    [30, 25], [-40, -20], [20, -50], [-60, 40],
    [55, -35], [-25, 60], [70, 10], [-10, -70],
  ];
  islandPositions.forEach(([x, z]) => {
    const h = 1.5 + Math.random() * 2;
    const r = 4 + Math.random() * 5;
    const geo = new THREE.CylinderGeometry(r, r * 1.3, h, 7);
    const mat = new THREE.MeshLambertMaterial({ color: 0x1a2a3a });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, -0.5 + h / 2, z);
    scene.add(mesh);
    // Top cap (lighter color)
    const top = new THREE.Mesh(new THREE.CircleGeometry(r, 7), new THREE.MeshLambertMaterial({ color: 0x223344 }));
    top.rotation.x = -Math.PI / 2;
    top.position.set(x, -0.5 + h + 0.01, z);
    scene.add(top);
  });

  // Boundary wall indicators (faint)
  const wallMat = new THREE.LineBasicMaterial({ color: 0x003355, transparent: true, opacity: 0.4 });
  const wallGeo = new THREE.EdgesGeometry(new THREE.BoxGeometry(200, 1, 200));
  const walls = new THREE.LineSegments(wallGeo, wallMat);
  walls.position.y = 0;
  scene.add(walls);

  return { islands: islandPositions.map(([x,z],i) => ({ x, z, r: 4 + (i % 3) * 2 })) };
}

// ══════════════════════════════════════════════════════
// GAME STATE
// ══════════════════════════════════════════════════════
const ARENA = 100; // half-size
const RESPAWN_TIME = 3;

class PlaneState {
  constructor(def, playerIdx, startX, startZ, startAngle) {
    this.def       = def;
    this.playerIdx = playerIdx;
    this.x         = startX;
    this.z         = startZ;
    this.angle     = startAngle;
    this.speed     = 0;
    this.hp        = def.hp;
    this.maxHp     = def.hp;
    this.alive     = true;
    this.respawnTimer = 0;
    this.fireCooldown = 0;
    this.specialCharge = 3; // 0-3
    this.specialCooldown = 0;
    this.shieldActive  = false;
    this.shieldTimer   = 0;
    this.cloaked       = false;
    this.cloakTimer    = 0;
    this.bankAngle     = 0; // visual tilt
    this.mesh          = null; // set after building
    this.trail         = null;
    this.score         = 0;
  }
}

// ══════════════════════════════════════════════════════
// MAIN GAME
// ══════════════════════════════════════════════════════

let renderer, scene, camera;
let bullets, particles, arena;
let planes = [], bots = [], trails = [];
let gameMode = '1v1';
let p1DefIdx = 1, p2DefIdx = 0; // selected plane indices
let pickerStep = 0; // 0=p1 picking, 1=p2 picking
let roundTime = 120;
let roundNum  = 1;
let gameRunning = false;
let gamePaused  = false;
let lastTime = 0;
let fpsCounter = 0, fpsTimer = 0;

const keys = new Set();
window.addEventListener('keydown', e => {
  keys.add(e.code);
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  if (e.code === 'Escape' && gameRunning) togglePause();
  if (e.code === 'Tab' && gameRunning) e.preventDefault();
});
window.addEventListener('keyup', e => keys.delete(e.code));

// ── THREE.JS SETUP ──
function initThree() {
  const canvas = document.getElementById('canvas');
  renderer = new THREE.WebGLRenderer({ canvas, antialias: Q.id !== 'POTATO', powerPreference: 'high-performance' });
  renderer.setPixelRatio(Q.pr);
  renderer.setSize(window.innerWidth, window.innerHeight);
  if (Q.shadows) { renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap; }

  scene = new THREE.Scene();
  scene.fog = Q.id !== 'POTATO' ? new THREE.FogExp2(0x020510, 0.006) : null;
  scene.background = new THREE.Color(0x020510);

  // Camera — top-down perspective
  camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.5, 500);
  camera.position.set(0, 90, 0);
  camera.lookAt(0, 0, 0);
  camera.rotation.z = 0;

  // Lighting
  const ambient = new THREE.AmbientLight(0x223355, Q.id === 'POTATO' ? 1.5 : 0.8);
  scene.add(ambient);
  if (Q.id !== 'POTATO') {
    const dir = new THREE.DirectionalLight(0x4488ff, 1.2);
    dir.position.set(50, 100, 50);
    if (Q.shadows) { dir.castShadow = true; dir.shadow.mapSize.set(1024,1024); }
    scene.add(dir);
    const fill = new THREE.DirectionalLight(0xffeedd, 0.3);
    fill.position.set(-50, 30, -50);
    scene.add(fill);
  }

  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
  });
}

// ── START GAME ──
function startGame() {
  // Clear old planes
  planes.forEach(p => { if (p.mesh) scene.remove(p.mesh); });
  if (trails.length) trails.forEach(t => scene.remove(t.line));
  trails = [];
  planes = [];

  // Build players
  const defs = [PLANE_DEFS[p1DefIdx], PLANE_DEFS[p2DefIdx]];
  const starts = [
    { x: -35, z: 0, angle: 0 },
    { x:  35, z: 0, angle: Math.PI },
  ];

  // In co-op vs bots mode, P2 is bot using same team
  const isBot = [false, gameMode !== '1v1'];
  if (gameMode === '2vb') {
    // Both human, add 2 bot enemies using indices 2,3 in a second team
    // For simplicity: P1 human, P2 human, Bot1, Bot2
  }

  for (let i = 0; i < 2; i++) {
    const ps = new PlaneState(defs[i], i, starts[i].x, starts[i].z, starts[i].angle);
    ps.mesh = buildPlane(defs[i]);
    ps.mesh.position.set(ps.x, 0.1, ps.z);
    ps.mesh.rotation.y = -ps.angle + Math.PI / 2;
    scene.add(ps.mesh);

    const trail = new Trail(scene, defs[i].color, Q.id === 'POTATO' ? 10 : 30);
    ps.trail = trail;
    trails.push(trail);

    planes.push(ps);
  }

  // Bot AI
  bots = [];
  if (gameMode === '1vb') {
    bots.push({ ai: new BotAI(1, planes), idx: 1 });
  } else if (gameMode === '2vb') {
    // Add two extra bot planes
    for (let b = 0; b < 2; b++) {
      const def = PLANE_DEFS[(b + 2) % PLANE_DEFS.length];
      const ps  = new PlaneState(def, 2 + b, (b === 0 ? 0 : 60), (b === 0 ? 60 : -60), Math.PI * 0.75);
      ps.mesh   = buildPlane(def);
      ps.mesh.position.set(ps.x, 0.1, ps.z);
      scene.add(ps.mesh);
      const trail = new Trail(scene, def.color, Q.id === 'POTATO' ? 10 : 30);
      ps.trail = trail;
      trails.push(trail);
      planes.push(ps);
      bots.push({ ai: new BotAI(2 + b, planes.filter(p => p.playerIdx < 2)), idx: 2 + b });
    }
  }

  bullets = new BulletPool(scene);
  particles = new Particles(scene, Q.particles);
  roundTime = 120;
  gameRunning = true;
  gamePaused  = false;

  updateHUD();
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('back-btn').classList.remove('hidden');
  document.getElementById('menu-screen').classList.add('hidden');
  document.getElementById('picker-screen').classList.add('hidden');
  document.getElementById('round-end').classList.add('hidden');

  lastTime = performance.now();
  requestAnimationFrame(loop);
}

// ── INPUT READING ──
function readInput(playerIdx) {
  if (playerIdx === 0) {
    return {
      thrust:  keys.has('KeyW'),
      brake:   keys.has('KeyS'),
      left:    keys.has('KeyA'),
      right:   keys.has('KeyD'),
      fire:    keys.has('Space'),
      special: keys.has('Tab'),
    };
  } else {
    return {
      thrust:  keys.has('ArrowUp'),
      brake:   keys.has('ArrowDown'),
      left:    keys.has('ArrowLeft'),
      right:   keys.has('ArrowRight'),
      fire:    keys.has('ControlRight') || keys.has('ControlLeft'),
      special: keys.has('AltRight') || keys.has('AltLeft'),
    };
  }
}

// ── PHYSICS UPDATE ──
function updatePlane(ps, input, dt, islandList) {
  if (!ps.alive) {
    ps.respawnTimer -= dt;
    if (ps.respawnTimer <= 0) respawn(ps);
    return;
  }

  const def = ps.def;

  // Rotation
  const turnSpeed = def.turnRate * (input.boost ? 1.3 : 1);
  if (input.left)  ps.angle -= turnSpeed * dt;
  if (input.right) ps.angle += turnSpeed * dt;

  // Speed
  const maxSpeed = def.speed * (ps.cloaked ? 1.15 : 1);
  if (input.thrust) ps.speed = Math.min(ps.speed + 20 * dt, maxSpeed);
  else if (input.brake) ps.speed = Math.max(ps.speed - 15 * dt, maxSpeed * 0.2);
  else ps.speed = ps.speed * (1 - 0.8 * dt); // drag

  // Move
  ps.x += Math.cos(ps.angle) * ps.speed * dt;
  ps.z += Math.sin(ps.angle) * ps.speed * dt;

  // Arena wrap / bounce
  const edge = ARENA - 2;
  if (ps.x >  edge) { ps.x =  edge; ps.angle = Math.PI - ps.angle; }
  if (ps.x < -edge) { ps.x = -edge; ps.angle = Math.PI - ps.angle; }
  if (ps.z >  edge) { ps.z =  edge; ps.angle = -ps.angle; }
  if (ps.z < -edge) { ps.z = -edge; ps.angle = -ps.angle; }

  // Island collision
  for (const isl of islandList) {
    const d = Math.hypot(ps.x - isl.x, ps.z - isl.z);
    if (d < isl.r + 1.5) {
      const away = Math.atan2(ps.z - isl.z, ps.x - isl.x);
      ps.x = isl.x + Math.cos(away) * (isl.r + 1.5);
      ps.z = isl.z + Math.sin(away) * (isl.r + 1.5);
      ps.angle = away + (Math.random() - 0.5) * 0.5;
      ps.speed *= 0.5;
    }
  }

  // Visual bank tilt
  const targetBank = input.left ? -0.4 : input.right ? 0.4 : 0;
  ps.bankAngle += (targetBank - ps.bankAngle) * 8 * dt;

  // Update mesh
  if (ps.mesh) {
    ps.mesh.position.set(ps.x, 0.1 + Math.sin(ps.angle * 2) * 0.05, ps.z);
    ps.mesh.rotation.y = -ps.angle + Math.PI / 2;
    ps.mesh.rotation.z = ps.bankAngle;
    ps.mesh.visible = !ps.cloaked || ps.playerIdx === 0 || (Math.floor(Date.now() / 200) % 2 === 0);
  }

  // Trail
  if (ps.trail && ps.speed > 1) ps.trail.add(ps.x, ps.z);

  // Fire cooldown
  ps.fireCooldown = Math.max(0, ps.fireCooldown - dt);

  // Shoot
  if (input.fire && ps.fireCooldown <= 0) {
    const fireInterval = 1 / def.fireRate;
    ps.fireCooldown = fireInterval;
    const spread = def.id === 'bomber' ? 0.1 : 0;
    const shootAngle = ps.angle + (Math.random() - 0.5) * spread;
    const bulletSpeed = def.id === 'bomber' ? 12 : 22;
    const bx = ps.x + Math.cos(ps.angle) * 2.5;
    const bz = ps.z + Math.sin(ps.angle) * 2.5;
    bullets.fire(bx, bz, shootAngle, bulletSpeed, def.bulletDmg, ps.playerIdx, def.color);
    if (def.id === 'fighter') {
      // double shot
      bullets.fire(bx + Math.cos(ps.angle + Math.PI/2) * 0.4,
                   bz + Math.sin(ps.angle + Math.PI/2) * 0.4,
                   shootAngle, bulletSpeed, def.bulletDmg * 0.7, ps.playerIdx, def.color);
    }
  }

  // Special ability
  ps.specialCooldown = Math.max(0, ps.specialCooldown - dt);
  if (ps.shieldActive) { ps.shieldTimer -= dt; if (ps.shieldTimer <= 0) ps.shieldActive = false; }
  if (ps.cloaked)      { ps.cloakTimer  -= dt; if (ps.cloakTimer  <= 0) ps.cloaked = false; }

  if (input.special && ps.specialCooldown <= 0 && ps.specialCharge > 0) {
    ps.specialCharge--;
    ps.specialCooldown = 8;
    activateSpecial(ps);
  }
}

function activateSpecial(ps) {
  const def = ps.def;
  if (def.special === 'boost')   { ps.speed = def.speed * 2.5; }
  if (def.special === 'shield')  { ps.shieldActive = true; ps.shieldTimer = 4; }
  if (def.special === 'cloak')   { ps.cloaked = true;  ps.cloakTimer = 5; }
  if (def.special === 'barrage') {
    for (let a = -2; a <= 2; a++) {
      bullets.fire(ps.x + Math.cos(ps.angle) * 2,
                   ps.z + Math.sin(ps.angle) * 2,
                   ps.angle + a * 0.2, 22, def.bulletDmg * 0.6, ps.playerIdx, def.color);
    }
  }
  if (def.special === 'bomb') {
    for (let a = 0; a < 8; a++) {
      bullets.fire(ps.x, ps.z, (Math.PI * 2 / 8) * a, 12, def.bulletDmg * 0.5, ps.playerIdx, def.color);
    }
  }
}

function respawn(ps) {
  ps.alive = true;
  ps.hp    = ps.maxHp * 0.7;
  ps.x     = (Math.random() - 0.5) * 100;
  ps.z     = (Math.random() - 0.5) * 100;
  ps.angle = Math.random() * Math.PI * 2;
  ps.speed = 0;
  ps.shieldActive = false; ps.cloaked = false;
  if (ps.mesh) ps.mesh.visible = true;
  if (ps.trail) ps.trail.clear();
  particles.emit(ps.x, ps.z, 15, 0xffffff);
}

// ── BULLET COLLISION ──
function checkBulletHits() {
  for (let bi = bullets.alive.length - 1; bi >= 0; bi--) {
    const b = bullets.alive[bi];
    for (const ps of planes) {
      if (!ps.alive) continue;
      if (b.owner === ps.playerIdx) continue;
      // In co-op mode, don't hit same team
      if (gameMode === '2vb') {
        const bOwnerIsHuman = b.owner < 2;
        const targetIsHuman = ps.playerIdx < 2;
        if (bOwnerIsHuman === targetIsHuman) continue;
      }
      const d = Math.hypot(b.mesh.position.x - ps.x, b.mesh.position.z - ps.z);
      if (d < 1.8) {
        // Hit!
        if (!ps.shieldActive) {
          ps.hp -= b.dmg;
          particles.emit(ps.x, ps.z, Q.id === 'POTATO' ? 5 : 15, ps.def.color);
          if (ps.hp <= 0) killPlane(ps, b.owner);
        } else {
          // Shield deflects
          particles.emit(ps.x, ps.z, 5, 0xffd700);
        }
        bullets.alive.splice(bi, 1);
        b.mesh.visible = false;
        bullets.pool.push(b);
        break;
      }
    }
  }
}

function killPlane(ps, killerOwner) {
  ps.alive = false;
  ps.respawnTimer = RESPAWN_TIME;
  if (ps.mesh) ps.mesh.visible = false;
  if (ps.trail) ps.trail.clear();
  particles.emit(ps.x, ps.z, Q.id === 'POTATO' ? 20 : 60, ps.def.color);

  // Give score to killer
  const killer = planes.find(p => p.playerIdx === killerOwner);
  if (killer) {
    killer.score++;
    document.getElementById(killer.playerIdx === 0 ? 'p1-score' : 'p2-score').textContent = killer.score;
  }

  // Kill feed
  const names = ['P1', 'P2', 'Bot', 'Bot2'];
  const msg = document.createElement('div');
  msg.className = 'kill-msg';
  msg.textContent = `${names[killerOwner] ?? '?'} ✈ ${names[ps.playerIdx] ?? '?'}`;
  document.getElementById('kill-feed').appendChild(msg);
  setTimeout(() => msg.remove(), 2500);
}

// ── CAMERA FOLLOW ──
let camTargetX = 0, camTargetZ = 0, camTargetDist = 90;
let camX = 0, camZ = 0, camDist = 90;

function updateCamera(dt) {
  const alivePlanes = planes.filter(p => p.alive && p.playerIdx < 2);
  if (alivePlanes.length === 0) return;

  // Target: midpoint of human players
  const cx = alivePlanes.reduce((s, p) => s + p.x, 0) / alivePlanes.length;
  const cz = alivePlanes.reduce((s, p) => s + p.z, 0) / alivePlanes.length;

  // Dynamic zoom based on separation
  let reqDist = 90;
  if (alivePlanes.length >= 2) {
    const spread = alivePlanes.reduce((mx, p) => Math.max(mx, Math.hypot(p.x - cx, p.z - cz)), 0);
    reqDist = Math.min(160, Math.max(70, spread * 2.5 + 50));
  }

  // Smooth follow
  const smooth = 2.5 * dt;
  camTargetX    = cx;
  camTargetZ    = cz;
  camTargetDist = reqDist;
  camX    += (camTargetX    - camX)    * smooth;
  camZ    += (camTargetZ    - camZ)    * smooth;
  camDist += (camTargetDist - camDist) * smooth;

  camera.position.set(camX, camDist, camZ + camDist * 0.05);
  camera.lookAt(camX, 0, camZ);
}

// ── HUD UPDATE ──
function updateHUD() {
  for (let i = 0; i < 2; i++) {
    const ps  = planes[i];
    if (!ps) continue;
    const hpPct = ps.alive ? Math.max(0, ps.hp / ps.maxHp * 100) : 0;
    const bar   = document.getElementById(i === 0 ? 'p1-hp' : 'p2-hp');
    if (bar) {
      bar.style.width = hpPct + '%';
      bar.style.background = hpPct > 50 ? (i === 0 ? '#00d4ff' : '#ff6b35')
                           : hpPct > 25 ? '#ffd700' : '#ff3333';
    }
    // Special pips
    const pipsEl = document.getElementById(i === 0 ? 'p1-pips' : 'p2-pips');
    if (pipsEl) {
      [...pipsEl.children].forEach((pip, pi) => {
        pip.classList.toggle('ready', pi < ps.specialCharge);
      });
    }
  }
}

// ── ROUND TIMER ──
function updateTimer(dt) {
  if (!gameRunning || gamePaused) return;
  roundTime -= dt;
  const sec = Math.max(0, roundTime);
  const m = Math.floor(sec / 60).toString().padStart(2, '0');
  const s = Math.floor(sec % 60).toString().padStart(2, '0');
  const timerEl = document.getElementById('timer');
  timerEl.textContent = `${m}:${s}`;
  timerEl.classList.toggle('low', sec < 15);

  if (roundTime <= 0) endRound();
}

function endRound() {
  gameRunning = false;
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('back-btn').classList.add('hidden');
  document.getElementById('round-end').classList.remove('hidden');

  const scores = planes.filter(p => p.playerIdx < 2).map(p => p.score);
  const p1s = scores[0] ?? 0;
  const p2s = scores[1] ?? 0;
  document.getElementById('re-p1').textContent = p1s;
  document.getElementById('re-p2').textContent = p2s;
  const winner = p1s > p2s ? 'Player 1 Wins! 🏆' : p2s > p1s ? 'Player 2 Wins! 🏆' : 'Draw! 🤝';
  document.getElementById('winner-text').textContent = winner;
  document.getElementById('winner-text').style.color = p1s > p2s ? '#00d4ff' : p2s > p1s ? '#ff6b35' : '#ffd700';
  roundNum++;
  document.getElementById('round-num').textContent = roundNum;
}

// ── GAME LOOP ──
function loop(now) {
  if (!gameRunning) return;
  requestAnimationFrame(loop);

  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;

  if (gamePaused) {
    renderer.render(scene, camera);
    return;
  }

  // FPS
  fpsTimer += dt; fpsCounter++;
  if (fpsTimer >= 0.5) {
    document.getElementById('fps').textContent = Math.round(fpsCounter / fpsTimer) + ' fps';
    fpsTimer = 0; fpsCounter = 0;
  }

  // Bot inputs
  const botInputs = {};
  bots.forEach(b => {
    const ps = planes[b.idx];
    if (ps) botInputs[b.idx] = b.ai.update(ps, dt);
  });

  // Update planes
  planes.forEach((ps, i) => {
    const input = (gameMode === '1v1' || i < 2) && !botInputs[i]
      ? readInput(ps.playerIdx)
      : botInputs[i] ?? {};
    updatePlane(ps, input, dt, arena.islands);
  });

  bullets.update(dt);
  checkBulletHits();
  particles.update(dt);
  updateCamera(dt);
  updateHUD();
  updateTimer(dt);

  renderer.render(scene, camera);
}

// ══════════════════════════════════════════════════════
// PAUSE
// ══════════════════════════════════════════════════════
function togglePause() {
  gamePaused = !gamePaused;
  document.getElementById('pause-screen').classList.toggle('hidden', !gamePaused);
}

// ══════════════════════════════════════════════════════
// UI WIRING
// ══════════════════════════════════════════════════════
function showPlanePicker(forP) {
  pickerStep = forP;
  const header = document.getElementById('picker-for');
  const isBotPick = gameMode === '1vb' && forP === 1;
  header.textContent = isBotPick ? 'Bot akan pilih sendiri...' :
    `Player ${forP + 1} — pilih pesawat`;

  const container = document.getElementById('plane-opts');
  container.innerHTML = '';

  PLANE_DEFS.forEach((def, idx) => {
    const btn = document.createElement('button');
    btn.className = 'plane-opt' + (idx === (forP === 0 ? p1DefIdx : p2DefIdx) ? ' selected' : '');
    const statHtml = ['speed','armor','firepower','agility'].map(k =>
      `<div class="stat-bar-row">
        <span class="stat-label">${k.substring(0,3)}</span>
        <div class="stat-track"><div class="stat-fill" style="width:${def.stats[k]*20}%;background:${forP===0?'#00d4ff':'#ff6b35'}"></div></div>
      </div>`
    ).join('');
    btn.innerHTML = `<span class="p-opt-name" style="color:#${def.color.toString(16).padStart(6,'0')}">${def.name}</span>
      <span style="font-size:10px;color:rgba(255,255,255,0.4)">${def.desc}</span>
      <div class="p-opt-stats">${statHtml}</div>`;
    btn.addEventListener('click', () => {
      [...container.querySelectorAll('.plane-opt')].forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      if (forP === 0) p1DefIdx = idx;
      else p2DefIdx = idx;
    });
    container.appendChild(btn);
  });

  document.getElementById('menu-screen').classList.add('hidden');
  document.getElementById('picker-screen').classList.remove('hidden');
}

// Mode buttons
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    gameMode = btn.dataset.mode;
    showPlanePicker(0);
  });
});

// Picker confirm
document.getElementById('picker-confirm').addEventListener('click', () => {
  if (pickerStep === 0 && gameMode === '1v1') {
    // Pick for P2 next
    showPlanePicker(1);
  } else {
    // Start game
    if (gameMode !== '1v1') p2DefIdx = Math.floor(Math.random() * PLANE_DEFS.length);
    document.getElementById('picker-screen').classList.add('hidden');
    startGame();
  }
});

document.getElementById('picker-back').addEventListener('click', () => {
  document.getElementById('picker-screen').classList.add('hidden');
  document.getElementById('menu-screen').classList.remove('hidden');
});

// Round end
document.getElementById('btn-next-round').addEventListener('click', () => {
  document.getElementById('round-end').classList.add('hidden');
  startGame();
});
document.getElementById('btn-main-menu').addEventListener('click', () => {
  document.getElementById('round-end').classList.add('hidden');
  document.getElementById('menu-screen').classList.remove('hidden');
  if (bullets) bullets.releaseAll();
  gameRunning = false;
});

// Pause
document.getElementById('btn-resume').addEventListener('click', togglePause);
document.getElementById('btn-pause-menu').addEventListener('click', () => {
  gamePaused = false;
  gameRunning = false;
  document.getElementById('pause-screen').classList.add('hidden');
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('back-btn').classList.add('hidden');
  document.getElementById('menu-screen').classList.remove('hidden');
  if (bullets) bullets.releaseAll();
});

// ── INIT ──
initThree();
arena = buildArena(scene);
// Render one frame of the background before the menu
renderer.render(scene, camera);

</script>
