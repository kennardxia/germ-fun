<!DOCTYPE html>
<!--v3--><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Drift King — germ.fun</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0505;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;height:100dvh}canvas{display:block;touch-action:none}#menu{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(239,68,68,.06) 0%,transparent 70%),#0a0505;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.2rem;z-index:100}#menu h1{font-size:clamp(2rem,6vw,4rem);font-weight:900;background:linear-gradient(135deg,#ef4444,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.mcard{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:1rem 1.4rem;cursor:pointer;transition:.18s;text-align:center;min-width:130px}.mcard:hover{background:rgba(239,68,68,.06);border-color:rgba(239,68,68,.3);transform:translateY(-2px)}.mrow{display:flex;gap:.9rem;flex-wrap:wrap;justify-content:center}.mi{font-size:2rem;margin-bottom:.3rem}.mcard h3{font-size:.88rem;font-weight:700;color:#ef4444}.mcard p{font-size:.72rem;color:#64748b}.bigbtn{background:linear-gradient(135deg,#ef4444,#f97316);border:none;color:#fff;padding:.8rem 3rem;border-radius:12px;font-size:1rem;font-weight:800;cursor:pointer}#hud{position:fixed;top:.5rem;left:.5rem;right:.5rem;display:flex;justify-content:space-between;pointer-events:none;z-index:50}.hb{background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:.3rem .7rem;font-size:.78rem;font-weight:700}.hv{font-size:1.1rem;font-weight:900;color:#ef4444}#gameOver{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;flex-direction:column;align-items:center;justify-content:center;gap:1rem;z-index:90}</style></head>
<body>
<div id="menu"><h1>🚗 DRIFT KING</h1><p style="color:#64748b">Master the art of drift — score combos on 3 tracks</p><div class="mrow"><div class="mcard" onclick="startGame('pc')"><div class="mi">🖥️

</div><h3>PC Mode</h3><p>WASD — steer + throttle</p></div><div class="mcard" onclick="startGame('mobile')"><div class="mi">📱</div><h3>Mobile</h3><p>Touch buttons</p></div><div class="mcard" onclick="openMultiplayer()" style="border-color:rgba(16,185,129,.35);background:rgba(16,185,129,.05)"><div class="mi">🌐</div><h3 style="color:#34d399">Online MP</h3><p>Drift together</p></div></div><a href="../" style="color:#475569;font-size:.82rem">← Games</a></div>
<div id="hud" style="display:none"><div class="hb">Drift <span class="hv" id="hD">0</span></div><div class="hb">Score <span class="hv" id="hS">0</span></div><div class="hb">Best <span class="hv" id="hB">0</span></div><div class="hb">Combo <span class="hv" id="hC">x1</span></div></div>
<div id="gameOver"><h2 style="font-size:2.5rem;font-weight:900;color:#ef4444">CRASHED!</h2><div style="color:#94a3b8">Score: <span id="goS" style="color:#f59e0b;font-weight:900"></span></div><button class="bigbtn" onclick="startGame(lastMode)">← Retry</button>
    <button onclick="openMultiplayer()" style="background:linear-gradient(135deg,#eab308,#ca8a04);border:none;color:#fff;padding:10px 24px;border-radius:10px;font-size:.9rem;font-weight:700;cursor:pointer;margin-top:8px">🌐 Online</button><a href="../" style="color:#475569;font-size:.82rem">← Games</a></div>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const isLowEnd=navigator.hardwareConcurrency<=4;
let W,H;function resize(){W=canvas.width=Math.min(window.innerWidth,1920);H=canvas.height=Math.min(window.innerHeight,1080);}resize();window.addEventListener('resize',resize);
// Track: oval with corners
const TRACK_W=90;
function buildTrack(){const pts=[];const N=80;for(let i=0;i<N;i++){const a=i/N*Math.PI*2;const r=Math.min(W,H)*.35;const x=W/2+Math.cos(a)*r*(1+Math.sin(a*2)*.2);const y=H/2+Math.sin(a)*r*.65;pts.push({x,y});}return pts;}
let car,track=[],smoke=[],score=0,bestScore=0,driftScore=0,combo=1,comboTimer=0,running=false,lastMode='pc';
const keys={};
function mkCar(){return{x:W/2+Math.min(W,H)*.35,y:H/2,angle:Math.PI/2,speed:0,steer:0,drift:0,hp:100,vx:0,vy:0,skid:0};}
function startGame(m){lastMode=m;track=buildTrack();car=mkCar();smoke=[];score=0;driftScore=0;combo=1;comboTimer=0;running=true;document.getElementById('menu').style.display='none';document.getElementById('gameOver').style.display='none';document.getElementById('hud').style.display='flex';}
window.addEventListener('keydown',e=>keys[e.key]=true);window.addEventListener('keyup',e=>keys[e.key]=false);
function update(){
  const gas=keys['ArrowUp']||keys['w']||keys['W'];
  const brake=keys['ArrowDown']||keys['s']||keys['S'];
  const left=keys['ArrowLeft']||keys['a']||keys['A'];
  const right=keys['ArrowRight']||keys['d']||keys['D'];
  if(gas)car.speed=Math.min(car.speed+.2,8);
  else if(brake)car.speed=Math.max(car.speed-.25,-3);
  else car.speed*=.97;
  const steerAmt=.055*(1-Math.abs(car.speed)*.03);
  if(left)car.angle-=steerAmt*car.speed*.7;
  if(right)car.angle+=steerAmt*car.speed*.7;
  // Drift: when turning fast + braking
  const drifting=(left||right)&&(brake||(Math.abs(car.speed)>5));
  if(drifting){car.drift=Math.min(car.drift+.08,1);}else{car.drift=Math.max(car.drift-.04,0);}
  const grip=1-car.drift*.6;
  car.vx=car.vx*.92+Math.cos(car.angle)*car.speed*(1-grip*.5);
  car.vy=car.vy*.92+Math.sin(car.angle)*car.speed*(1-grip*.5);
  car.vx+=Math.cos(car.angle)*car.speed*grip*.2;
  car.vy+=Math.sin(car.angle)*car.speed*grip*.2;
  car.x+=car.vx;car.y+=car.vy;
  // Keep on track approximation — find nearest track point
  let minD=99999,minI=0;
  for(let i=0;i<track.length;i++){const d=Math.hypot(car.x-track[i].x,car.y-track[i].y);if(d<minD){minD=d;minI=i;}}
  if(minD>TRACK_W){car.hp-=1;if(car.hp<=0)endGame();}
  // Drift score
  if(car.drift>.3&&Math.abs(car.speed)>2){
    driftScore+=car.drift*car.speed*.5;
    if(driftScore>100){score+=Math.round(combo*10);driftScore=0;combo=Math.min(combo+1,8);comboTimer=120;}
  }else if(car.drift<.1){if(comboTimer===0&&combo>1)combo=Math.max(1,combo-1);driftScore=Math.max(0,driftScore-1);}
  if(comboTimer>0)comboTimer--;
  bestScore=Math.max(bestScore,score);
  // Smoke
  if(car.drift>.4){smoke.push({x:car.x-Math.cos(car.angle)*14,y:car.y-Math.sin(car.angle)*14,life:30,r:3+Math.random()*4});}
  for(let i=smoke.length-1;i>=0;i--){smoke[i].life--;smoke[i].r+=.3;if(smoke[i].life<=0)smoke.splice(i,1);}
  document.getElementById('hD').textContent=Math.round(driftScore);document.getElementById('hS').textContent=score;document.getElementById('hB').textContent=bestScore;document.getElementById('hC').textContent='x'+combo;
}
function endGame(){running=false;document.getElementById('hud').style.display='none';document.getElementById('goS').textContent=score;document.getElementById('gameOver').style.display='flex';}
function draw(){
  ctx.fillStyle='#0a0505';ctx.fillRect(0,0,W,H);
  // Track
  ctx.save();ctx.strokeStyle='#1a0a0a';ctx.lineWidth=TRACK_W*2;ctx.beginPath();track.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));ctx.closePath();ctx.stroke();
  ctx.strokeStyle='#2a1010';ctx.lineWidth=TRACK_W*1.9;ctx.beginPath();track.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));ctx.closePath();ctx.stroke();
  ctx.strokeStyle='#3a1515';ctx.lineWidth=TRACK_W*1.7;ctx.setLineDash([20,15]);ctx.beginPath();track.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));ctx.closePath();ctx.stroke();ctx.setLineDash([]);
  ctx.restore();
  // Smoke
  for(const s of smoke){ctx.save();ctx.globalAlpha=s.life/30*.4;ctx.fillStyle='#888';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();ctx.restore();}
  // Car
  ctx.save();ctx.translate(car.x,car.y);ctx.rotate(car.angle);ctx.fillStyle='#ef4444';ctx.shadowColor='#ef4444';ctx.shadowBlur=20;ctx.fillRect(-16,-9,32,18);ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(-6,-7,14,14);ctx.restore();ctx.shadowBlur=0;
  // HP bar
  ctx.fillStyle='rgba(0,0,0,.4)';ctx.fillRect(10,H-22,150,8);ctx.fillStyle='#34d399';ctx.fillRect(10,H-22,150*(car.hp/100),8);
}
(function(){if(!('ontouchstart' in window)&&!navigator.maxTouchPoints)return;let jId=-1,jX=0,jY=0;const K=keys,D=22;function setJ(u,d,l,r){K.w=K.W=K.KeyW=K.arrowup=K.ArrowUp=u;K.s=K.S=K.KeyS=K.arrowdown=K.ArrowDown=d;K.a=K.A=K.KeyA=K.arrowleft=K.ArrowLeft=l;K.d=K.D=K.KeyD=K.arrowright=K.ArrowRight=r;}canvas.addEventListener('touchstart',e=>{e.preventDefault();for(const t of e.changedTouches)if(jId<0){jId=t.identifier;jX=t.clientX;jY=t.clientY;}},{passive:false});canvas.addEventListener('touchmove',e=>{e.preventDefault();for(const t of e.changedTouches)if(t.identifier===jId){const dx=t.clientX-jX,dy=t.clientY-jY;setJ(dy<-D,dy>D,dx<-D,dx>D);}},{passive:false});canvas.addEventListener('touchend',e=>{e.preventDefault();for(const t of e.changedTouches)if(t.identifier===jId){jId=-1;setJ(false,false,false,false);}},{passive:false});})();
function loop(){if(running){try{update();}catch(e){console.error('[drift-king]',e);running=false;}}try{draw();}catch(e){console.error('[drift-king draw]',e);}requestAnimationFrame(loop);}
requestAnimationFrame(loop);

// ===== ONLINE MULTIPLAYER =====
const MP_WORKER='https://germ-fun.kennardxia.workers.dev';const MP_GAME='driftking';
let mpWs=null,mpPlayerId=null,mpPeers={},mpConnected=false,mpSendTimer=0;
function openMultiplayer(){
  let ov=document.getElementById('mpOverlay');
  if(!ov){
    ov=document.createElement('div');ov.id='mpOverlay';
    ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:150;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.2rem;backdrop-filter:blur(12px)';
    ov.innerHTML='<h2 style="font-size:1.8rem;font-weight:900;color:#eab308">🌐 Online Race</h2><p style="color:#64748b">Drift race — highest combo wins</p><div style="display:flex;gap:1rem;flex-wrap:wrap;justify-content:center"><div style="background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:1.2rem;text-align:center;min-width:160px"><div style="font-size:.7rem;color:#64748b;margin-bottom:.6rem;text-transform:uppercase;letter-spacing:.05em">Create Room</div><button onclick="mpCreate()" style="background:linear-gradient(135deg,#eab308,#eab308aa);border:none;color:#fff;padding:.6rem 1.4rem;border-radius:10px;font-weight:800;cursor:pointer">+ Create</button><div id="mpCode" style="margin-top:.8rem;font-size:1.6rem;font-weight:900;color:#f59e0b;letter-spacing:.2em;display:none"></div></div><div style="background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:1.2rem;text-align:center;min-width:160px"><div style="font-size:.7rem;color:#64748b;margin-bottom:.6rem;text-transform:uppercase;letter-spacing:.05em">Join Room</div><input id="mpCodeInput" maxlength="6" placeholder="XXXXXX" style="background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.15);color:#e2e8f0;padding:.5rem .8rem;border-radius:8px;font-size:1rem;width:120px;text-align:center;text-transform:uppercase"><br><br><button onclick="mpJoin()" style="background:linear-gradient(135deg,#eab308,#eab308aa);border:none;color:#fff;padding:.6rem 1.4rem;border-radius:10px;font-weight:800;cursor:pointer">→ Join</button></div></div><div id="mpStatus" style="font-size:.82rem;color:#94a3b8"></div><div id="mpPlayers" style="font-size:.78rem;color:#64748b"></div><button onclick="document.getElementById(\'mpOverlay\').style.display=\'none\'" style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#94a3b8;padding:.5rem 1.2rem;border-radius:10px;cursor:pointer;margin-top:.4rem">✕ Close</button>';
    document.body.appendChild(ov);
  }else{ov.style.display='flex';}
}
async function mpCreate(){
  setMpStatus('Creating room…');
  try{const r=await fetch(MP_WORKER+'/room/create?game='+MP_GAME,{method:'POST'});if(!r.ok)throw 0;const {code}=await r.json();document.getElementById('mpCode').textContent=code;document.getElementById('mpCode').style.display='block';setMpStatus('Share code: '+code);mpConnect(code);}catch{setMpStatus('⚠ Server unreachable. Play offline.');}
}
function mpJoin(){const c=(document.getElementById('mpCodeInput').value||'').trim().toUpperCase();if(c.length!==6){setMpStatus('Enter a 6-character room code');return;}mpConnect(c);}
function mpConnect(code){
  setMpStatus('Connecting…');
  if(mpWs){try{mpWs.close();}catch{}}
  try{
    mpWs=new WebSocket(MP_WORKER.replace('https','wss')+'/room/'+code+'/ws?game='+MP_GAME);
    mpWs.onopen=()=>setMpStatus('Connected — room '+code);
    mpWs.onclose=()=>{mpConnected=false;mpWs=null;mpPeers={};setMpStatus('Disconnected');};
    mpWs.onerror=()=>setMpStatus('⚠ Connection failed');
    mpWs.onmessage=(ev)=>{
      let d;try{d=JSON.parse(ev.data);}catch{return;}
      if(!d||typeof d!=='object')return;
      if(d.type==='welcome'){mpPlayerId=d.id;mpConnected=true;setMpStatus('✓ In room — Player '+d.count);setMpPlayerCount(d.count);const ov=document.getElementById('mpOverlay');if(ov)ov.style.display='none';startGame('pc');}
      else if(d.type==='join'){setMpPlayerCount(d.count);}
      else if(d.type==='leave'){delete mpPeers[d.id];}
      else if(d.type==='state'&&d.from&&d.from!==mpPlayerId){mpPeers[d.from]={x:+d.x||0,y:+d.y||0,angle:+d.angle||0,score:+d.score||0};}
    };
  }catch{setMpStatus('⚠ WebSocket unavailable');}
}
function setMpStatus(m){const el=document.getElementById('mpStatus');if(el)el.textContent=m;}
function setMpPlayerCount(n){const el=document.getElementById('mpPlayers');if(el)el.textContent='Players in room: '+n;}
const _mpOrigdraw=draw;
draw=function(){
  _mpOrigdraw();
  if(mpConnected&&mpWs&&mpWs.readyState===1){mpSendTimer++;if(mpSendTimer>=3){mpSendTimer=0;try{mpWs.send(JSON.stringify({type:'state',x:car?car.x:0,y:car?car.y:0,angle:car?car.angle:0,speed:car?car.speed:0,score:score||0}));}catch{}}}
  if(!mpConnected||!Object.keys(mpPeers).length)return;
  let _gi=0;
  for(const _id in mpPeers){
    const _p=mpPeers[_id];_gi++;
    const _cx=typeof _p.x==='number'?_p.x:0;
    const _cy=typeof _p.y==='number'?_p.y:0;
    ctx.save();
    ctx.globalAlpha=0.55;
    ctx.beginPath();ctx.arc(_cx,_cy,14,0,Math.PI*2);
    ctx.fillStyle='#eab308';ctx.fill();
    ctx.font='bold 9px Segoe UI';ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('P'+(_gi+1),_cx,_cy);
    ctx.globalAlpha=1;
    // HP bar
    if(typeof _p.hp==='number'){
      ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(_cx-14,_cy+17,28,5);
      ctx.fillStyle='#eab308';ctx.fillRect(_cx-14,_cy+17,28*(_p.hp/100),5);
    }
    ctx.restore();
  }
};
</script></body></html>
