<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laser Bounce — GERM.FUN</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden}
canvas{position:fixed;inset:0;width:100%;height:100%}
.card{position:relative;z-index:10;text-align:center;padding:2.5rem 2rem;background:rgba(0,0,0,.55);border:1px solid rgba(6,182,212,.25);border-radius:20px;max-width:380px;backdrop-filter:blur(16px)}
.badge{display:inline-block;background:rgba(6,182,212,.15);border:1px solid rgba(6,182,212,.4);color:#67e8f9;font-size:.65rem;font-weight:800;letter-spacing:.2em;padding:.3rem .8rem;border-radius:20px;text-transform:uppercase;margin-bottom:1rem}
.ico{font-size:4rem;margin-bottom:.8rem}
h1{font-size:2.5rem;font-weight:900;color:#fff;margin-bottom:.4rem;letter-spacing:-1px}
p{font-size:.9rem;color:#94a3b8;line-height:1.6;margin-bottom:1.5rem}
.features{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;margin-bottom:1.5rem}
.feat{background:rgba(6,182,212,.08);border:1px solid rgba(6,182,212,.2);color:#67e8f9;font-size:.72rem;padding:.25rem .65rem;border-radius:8px}
a.back{display:inline-block;color:#64748b;font-size:.82rem;text-decoration:none;border:1px solid rgba(255,255,255,.08);padding:.4rem 1rem;border-radius:8px}
a.back:hover{color:#67e8f9}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="card">
  <div class="badge">Coming Soon</div>
  <div class="ico">🔦</div>
  <h1>LASER BOUNCE</h1>
  <p>Fire lasers that ricochet off mirrored walls. Chain bounces to eliminate targets, solve optical puzzles, and unlock increasingly complex arenas.</p>
  <div class="features">
    <span class="feat">🔦 Ricochet Physics</span>
    <span class="feat">🪞 Mirror Walls</span>
    <span class="feat">🧩 50 Puzzles</span>
    <span class="feat">💰 Coin System</span>
    <span class="feat">🎮 PC + Mobile</span>
  </div>
  <a class="back" href="../">← Back to Games</a>
</div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
let W,H;function resize(){W=c.width=innerWidth;H=c.height=innerHeight;}resize();window.addEventListener('resize',resize);
const COL='#06b6d4';
let t=0;
// Bouncing laser beam
let bx=200,by=200,bvx=3.5,bvy=2.2;
const beamTrail=[];
function loop(){
  t+=.016;
  ctx.fillStyle='rgba(0,5,10,.18)';ctx.fillRect(0,0,W,H);
  bx+=bvx;by+=bvy;
  if(bx<20||bx>W-20){bvx*=-1;spawnRipple(bx,by);}
  if(by<20||by>H-20){bvy*=-1;spawnRipple(bx,by);}
  beamTrail.push({x:bx,y:by,a:1});
  if(beamTrail.length>40)beamTrail.shift();
  // Draw trail
  for(let i=1;i<beamTrail.length;i++){
    const a=(i/beamTrail.length)*.8;
    ctx.beginPath();ctx.moveTo(beamTrail[i-1].x,beamTrail[i-1].y);ctx.lineTo(beamTrail[i].x,beamTrail[i].y);
    ctx.strokeStyle=`rgba(6,182,212,${a})`;ctx.lineWidth=2+a*2;ctx.shadowColor=COL;ctx.shadowBlur=8*a;ctx.stroke();
  }
  ctx.shadowBlur=0;
  // Head glow
  ctx.beginPath();ctx.arc(bx,by,5,0,Math.PI*2);ctx.fillStyle=COL;ctx.shadowColor=COL;ctx.shadowBlur=20;ctx.fill();ctx.shadowBlur=0;
  // Grid lines
  ctx.strokeStyle='rgba(6,182,212,.04)';ctx.lineWidth=1;
  for(let x=0;x<W;x+=50){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=50){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  requestAnimationFrame(loop);
}
function spawnRipple(x,y){}
loop();
</script>
</body>
</html>
