<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asteroid Belt — GERM.FUN</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden}
canvas{position:fixed;inset:0;width:100%;height:100%}
.card{position:relative;z-index:10;text-align:center;padding:2.5rem 2rem;background:rgba(0,0,0,.55);border:1px solid rgba(132,204,22,.25);border-radius:20px;max-width:380px;backdrop-filter:blur(16px)}
.badge{display:inline-block;background:rgba(132,204,22,.15);border:1px solid rgba(132,204,22,.4);color:#bef264;font-size:.65rem;font-weight:800;letter-spacing:.2em;padding:.3rem .8rem;border-radius:20px;text-transform:uppercase;margin-bottom:1rem}
.ico{font-size:4rem;margin-bottom:.8rem}
h1{font-size:2.5rem;font-weight:900;color:#fff;margin-bottom:.4rem;letter-spacing:-1px}
p{font-size:.9rem;color:#94a3b8;line-height:1.6;margin-bottom:1.5rem}
.features{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;margin-bottom:1.5rem}
.feat{background:rgba(132,204,22,.08);border:1px solid rgba(132,204,22,.2);color:#bef264;font-size:.72rem;padding:.25rem .65rem;border-radius:8px}
a.back{display:inline-block;color:#64748b;font-size:.82rem;text-decoration:none;border:1px solid rgba(255,255,255,.08);padding:.4rem 1rem;border-radius:8px}
a.back:hover{color:#bef264}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="card">
  <div class="badge">Coming Soon</div>
  <div class="ico">☄️</div>
  <h1>ASTEROID BELT</h1>
  <p>Classic Asteroids, reborn. Infinite waves, power-up crates, leaderboards, and a fully destructible asteroid physics system unlike anything you've seen.</p>
  <div class="features">
    <span class="feat">☄️ Physics Rocks</span>
    <span class="feat">🚀 Ship Mods</span>
    <span class="feat">🏆 Leaderboard</span>
    <span class="feat">💰 Coin System</span>
    <span class="feat">🎮 PC + Mobile</span>
  </div>
  <a class="back" href="../">← Back to Games</a>
</div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
let W,H;function resize(){W=c.width=innerWidth;H=c.height=innerHeight;}resize();window.addEventListener('resize',resize);
const COL='#84cc16';
const asts=[];
for(let i=0;i<15;i++){
  const verts=[];const n=6+Math.floor(Math.random()*4);for(let j=0;j<n;j++){const a=j/n*Math.PI*2;const r=20+Math.random()*25;verts.push({a,r});}
  asts.push({x:Math.random()*1200,y:Math.random()*800,vx:(Math.random()-.5)*.8,vy:(Math.random()-.5)*.8,rot:Math.random()*Math.PI*2,rotSpd:(Math.random()-.5)*.015,verts,size:20+Math.random()*30});
}
let t=0;
function loop(){
  t+=.016;
  ctx.fillStyle='rgba(1,5,0,.18)';ctx.fillRect(0,0,W,H);
  // Stars
  if(t<.1){ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);}
  asts.forEach(a=>{
    a.x+=a.vx;a.y+=a.vy;a.rot+=a.rotSpd;
    if(a.x<-60)a.x=W+60;if(a.x>W+60)a.x=-60;if(a.y<-60)a.y=H+60;if(a.y>H+60)a.y=-60;
    const ax=a.x*W/1200,ay=a.y*H/800,sc=a.size*Math.min(W,H)/600;
    ctx.save();ctx.translate(ax,ay);ctx.rotate(a.rot);ctx.beginPath();
    a.verts.forEach((v,i)=>{const x=Math.cos(v.a+a.rot)*v.r*(sc/20);const y=Math.sin(v.a+a.rot)*v.r*(sc/20);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
    ctx.closePath();ctx.fillStyle=COL+'22';ctx.strokeStyle=COL+'99';ctx.lineWidth=1.5;ctx.fill();ctx.stroke();
    ctx.restore();
  });
  // Orbital ring
  const orR=Math.min(W,H)*.35;
  ctx.beginPath();ctx.arc(W/2,H/2,orR,0,Math.PI*2);ctx.strokeStyle=COL+'18';ctx.lineWidth=1;ctx.setLineDash([4,8]);ctx.stroke();ctx.setLineDash([]);
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
