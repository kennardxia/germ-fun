<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mech Arena — GERM.FUN</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden}
canvas{position:fixed;inset:0;width:100%;height:100%}
.card{position:relative;z-index:10;text-align:center;padding:2.5rem 2rem;background:rgba(0,0,0,.55);border:1px solid rgba(220,38,38,.25);border-radius:20px;max-width:380px;backdrop-filter:blur(16px)}
.badge{display:inline-block;background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.4);color:#f87171;font-size:.65rem;font-weight:800;letter-spacing:.2em;padding:.3rem .8rem;border-radius:20px;text-transform:uppercase;margin-bottom:1rem}
.ico{font-size:4rem;margin-bottom:.8rem}
h1{font-size:2.5rem;font-weight:900;color:#fff;margin-bottom:.4rem;letter-spacing:-1px}
p{font-size:.9rem;color:#94a3b8;line-height:1.6;margin-bottom:1.5rem}
.features{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;margin-bottom:1.5rem}
.feat{background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.2);color:#f87171;font-size:.72rem;padding:.25rem .65rem;border-radius:8px}
a.back{display:inline-block;color:#64748b;font-size:.82rem;text-decoration:none;border:1px solid rgba(255,255,255,.08);padding:.4rem 1rem;border-radius:8px}
a.back:hover{color:#f87171}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="card">
  <div class="badge">Coming Soon</div>
  <div class="ico">🤖</div>
  <h1>MECH ARENA</h1>
  <p>Pilot towering battle mechs in a post-apocalyptic coliseum. Swap weapons mid-battle, unlock armor mods, and destroy enemy mechs in brutal 1v1 combat.</p>
  <div class="features">
    <span class="feat">⚙️ 6 Mech Classes</span>
    <span class="feat">🔧 Weapon Mods</span>
    <span class="feat">🛡️ Armor System</span>
    <span class="feat">💰 Coin System</span>
    <span class="feat">🎮 PC + Mobile</span>
  </div>
  <a class="back" href="../">← Back to Games</a>
</div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
let W,H;function resize(){W=c.width=innerWidth;H=c.height=innerHeight;}resize();window.addEventListener('resize',resize);
const COL='#dc2626';
let t=0;
const sparks=[];for(let i=0;i<40;i++)sparks.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*2,vy:-Math.random()*2-1,life:Math.random()*60,maxLife:60,r:1+Math.random()*2});
function loop(){
  t+=.015;
  ctx.fillStyle='rgba(8,0,0,.2)';ctx.fillRect(0,0,W,H);
  // Grid
  ctx.strokeStyle='rgba(220,38,38,.06)';ctx.lineWidth=1;
  const gs=60;for(let x=0;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  // Sparks
  sparks.forEach(s=>{s.x+=s.vx;s.y+=s.vy;s.vy+=.05;s.life--;
    if(s.life<=0){s.x=Math.random()*W;s.y=H+20;s.vy=-Math.random()*3-1;s.vx=(Math.random()-.5)*2;s.life=s.maxLife;}
    const a=s.life/s.maxLife;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(239,68,68,${a*.8})`;ctx.fill();
  });
  // Pulse ring
  const pr=(Math.sin(t)+1)/2*200+50;
  ctx.beginPath();ctx.arc(W/2,H/2,pr,0,Math.PI*2);ctx.strokeStyle=COL+'22';ctx.lineWidth=2;ctx.stroke();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
