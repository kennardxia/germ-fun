<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Duel — GERM.FUN</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden}
canvas{position:fixed;inset:0;width:100%;height:100%}
.card{position:relative;z-index:10;text-align:center;padding:2.5rem 2rem;background:rgba(0,0,0,.55);border:1px solid rgba(239,68,68,.25);border-radius:20px;max-width:380px;backdrop-filter:blur(16px)}
.badge{display:inline-block;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);color:#fca5a5;font-size:.65rem;font-weight:800;letter-spacing:.2em;padding:.3rem .8rem;border-radius:20px;text-transform:uppercase;margin-bottom:1rem}
.ico{font-size:4rem;margin-bottom:.8rem}
h1{font-size:2.5rem;font-weight:900;color:#fff;margin-bottom:.4rem;letter-spacing:-1px}
p{font-size:.9rem;color:#94a3b8;line-height:1.6;margin-bottom:1.5rem}
.features{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;margin-bottom:1.5rem}
.feat{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#fca5a5;font-size:.72rem;padding:.25rem .65rem;border-radius:8px}
a.back{display:inline-block;color:#64748b;font-size:.82rem;text-decoration:none;border:1px solid rgba(255,255,255,.08);padding:.4rem 1rem;border-radius:8px}
a.back:hover{color:#fca5a5}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="card">
  <div class="badge">Coming Soon</div>
  <div class="ico">⚔️</div>
  <h1>PIXEL DUEL</h1>
  <p>Fast-paced pixel art sword duels. Parry, riposte, and combo your opponent into oblivion. Choose from 8 fighter classes each with unique movesets.</p>
  <div class="features">
    <span class="feat">⚔️ 8 Fighters</span>
    <span class="feat">🛡️ Parry System</span>
    <span class="feat">🎯 Combo Chain</span>
    <span class="feat">💰 Coin System</span>
    <span class="feat">👥 2P Local</span>
  </div>
  <a class="back" href="../">← Back to Games</a>
</div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
let W,H;function resize(){W=c.width=innerWidth;H=c.height=innerHeight;}resize();window.addEventListener('resize',resize);
const COL='#ef4444';
let t=0;
const pixels=[];
for(let i=0;i<80;i++)pixels.push({x:Math.random()*800,y:Math.random()*600,size:4+Math.floor(Math.random()*8)*2,col:['#ef4444','#fca5a5','#7f1d1d','#dc2626'][Math.floor(Math.random()*4)],vx:(Math.random()-.5)*.8,vy:(Math.random()-.5)*.8,rot:0,rotSpd:(Math.random()-.5)*.04,a:Math.random()*.4+.1});
function loop(){
  t+=.016;
  ctx.fillStyle='rgba(8,0,0,.15)';ctx.fillRect(0,0,W,H);
  pixels.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.rot+=p.rotSpd;
    if(p.x<-20)p.x=W+20;if(p.x>W+20)p.x=-20;if(p.y<-20)p.y=H+20;if(p.y>H+20)p.y=-20;
    const s=p.size*Math.min(W,H)/600;
    ctx.save();ctx.translate(p.x*W/800,p.y*H/600);ctx.rotate(p.rot);
    ctx.fillStyle=p.col+(Math.floor(p.a*255).toString(16).padStart(2,'0'));
    ctx.fillRect(-s/2,-s/2,s,s);ctx.restore();
  });
  // Cross swords animation
  const cx=W/2,cy=H*.75;const sw=60*Math.min(W,H)/600;
  ctx.save();ctx.translate(cx,cy);
  ctx.save();ctx.rotate(.4+Math.sin(t)*.15);ctx.strokeStyle=COL+'66';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(-sw,-sw/6);ctx.lineTo(sw,sw/6);ctx.stroke();ctx.restore();
  ctx.save();ctx.rotate(-.4+Math.cos(t)*.15);ctx.strokeStyle='#fca5a566';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(-sw,sw/6);ctx.lineTo(sw,-sw/6);ctx.stroke();ctx.restore();
  ctx.restore();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
