<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Pixel Duel — germ.fun</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#080810;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;height:100dvh}canvas{display:block;touch-action:none;image-rendering:pixelated}#menu{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(168,85,247,.06) 0%,transparent 70%),#080810;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.2rem;z-index:100}#menu h1{font-size:clamp(2rem,6vw,4rem);font-weight:900;background:linear-gradient(135deg,#a855f7,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.mcard{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:1rem 1.4rem;cursor:pointer;transition:.18s;text-align:center;min-width:130px}.mcard:hover{background:rgba(168,85,247,.06);border-color:rgba(168,85,247,.3);transform:translateY(-2px)}.mrow{display:flex;gap:.9rem;flex-wrap:wrap;justify-content:center}.mi{font-size:2rem;margin-bottom:.3rem}.mcard h3{font-size:.88rem;font-weight:700;color:#a855f7}.mcard p{font-size:.72rem;color:#64748b}.bigbtn{background:linear-gradient(135deg,#a855f7,#ec4899);border:none;color:#fff;padding:.8rem 3rem;border-radius:12px;font-size:1rem;font-weight:800;cursor:pointer}#hud{position:fixed;top:.5rem;left:.5rem;right:.5rem;display:flex;justify-content:space-between;pointer-events:none;z-index:50}.hb{background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:.3rem .7rem;font-size:.78rem;font-weight:700}.hv{font-size:1.1rem;font-weight:900;color:#a855f7}#gameOver{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;flex-direction:column;align-items:center;justify-content:center;gap:1rem;z-index:90}</style></head>
<body>
<div id="menu"><h1>⚔️ PIXEL DUEL</h1><p style="color:#64748b">1v1 side-scrolling fighter — 4 characters — 3 rounds</p><div class="mrow"><div class="mcard" onclick="startGame('1p')"><div class="mi">🎮
<div class="mcard" onclick="openMultiplayer()" style="border-color:rgba(16,185,129,.35);background:rgba(16,185,129,.05)"><div class="mi">🌐</div><h3 style="color:#34d399">Online MP</h3><p>Fight online</p></div>
</div><h3>vs CPU</h3><p>WASD + J/K attack</p></div><div class="mcard" onclick="startGame('2p')"><div class="mi">👥</div><h3>2 Player</h3><p>P1 WASD | P2 Arrows</p></div></div><a href="../" style="color:#475569;font-size:.82rem">← Games</a></div>
<div id="hud" style="display:none"><div class="hb">P1 HP <span class="hv" id="hH1">100</span></div><div class="hb">Round <span class="hv" id="hR">1/3</span></div><div class="hb">P2 HP <span class="hv" id="hH2">100</span></div></div>
<div id="gameOver"><h2 style="font-size:2.5rem;font-weight:900;color:#a855f7" id="goTxt">P1 WINS!</h2><button class="bigbtn" onclick="startGame(lastMode)">← Rematch</button>
    <button onclick="openMultiplayer()" style="background:linear-gradient(135deg,#ef4444,#dc2626);border:none;color:#fff;padding:10px 24px;border-radius:10px;font-size:.9rem;font-weight:700;cursor:pointer;margin-top:8px">🌐 Online</button><a href="../" style="color:#475569;font-size:.82rem">← Games</a></div>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const isLowEnd=navigator.hardwareConcurrency<=4;
const GW=480,GH=270;canvas.width=GW;canvas.height=GH;
canvas.style.width=Math.min(window.innerWidth,GW*3)+'px';canvas.style.height='auto';canvas.style.display='block';canvas.style.margin='auto';canvas.style.marginTop=Math.max(0,(window.innerHeight-GH*3)/2)+'px';
let players,round=1,wins=[0,0],running=false,lastMode='1p';
const CHARS=[{col:'#a855f7',col2:'#7c3aed'},{col:'#ec4899',col2:'#db2777'}];
const FLOOR=GH-40;
const keys={};
window.addEventListener('keydown',e=>keys[e.key]=true);window.addEventListener('keyup',e=>keys[e.key]=false);
function mkP(x,idx,isAI){return{x,y:FLOOR,w:20,h:30,vx:0,vy:0,hp:100,maxHp:100,facing:idx===0?1:-1,jumpCd:0,atkCd:0,blockCd:0,blocking:false,stun:0,idx,isAI,aiCd:0,airborne:false,col:CHARS[idx].col,col2:CHARS[idx].col2,atkAnim:0,hitFlash:0};}
function startGame(m){lastMode=m;round=1;wins=[0,0];startRound();}
function startRound(){players=[mkP(80,0,false),mkP(GW-80,1,lastMode==='1p')];running=true;document.getElementById('menu').style.display='none';document.getElementById('gameOver').style.display='none';document.getElementById('hud').style.display='flex';document.getElementById('hR').textContent=round+'/3';}
function input(p){
  if(p.isAI){
    const t=players[1-p.idx];
    p.aiCd--;
    if(p.aiCd<=0){p.aiCd=15+Math.floor(Math.random()*20);
      const dx=t.x-p.x;p.facing=dx>0?1:-1;
      if(Math.abs(dx)>60){p.vx=p.facing*1.8;}else{p.vx=0;}
      if(Math.abs(dx)<45&&p.atkCd===0)attack(p,t);
      if(p.y>=FLOOR&&Math.random()<.3&&Math.abs(dx)<100){p.vy=-5;p.airborne=true;}
    }
    return;
  }
  const i=p.idx;const k=i===0?['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','m','.',',']:[' ','x','z','a','s','d','f'];
  // idx0: WASD + J/K; idx1: arrows + ,/.
  if(i===0){
    p.vx=(keys['a']||keys['A'])?-2.2:(keys['d']||keys['D'])?2.2:0;
    if((keys['w']||keys['W'])&&p.y>=FLOOR&&!p.airborne){p.vy=-5.5;p.airborne=true;}
    if((keys['j']||keys['J'])&&p.atkCd===0)attack(p,players[1]);
    if(keys['k']||keys['K'])p.blocking=true;else p.blocking=false;
  }else{
    p.vx=keys['ArrowLeft']?-2.2:keys['ArrowRight']?2.2:0;
    if(keys['ArrowUp']&&p.y>=FLOOR&&!p.airborne){p.vy=-5.5;p.airborne=true;}
    if(keys[',']&&p.atkCd===0)attack(p,players[0]);
    if(keys['.'])p.blocking=true;else p.blocking=false;
  }
  if(p.vx>0)p.facing=1;else if(p.vx<0)p.facing=-1;
}
function attack(attacker,target){
  attacker.atkCd=20;attacker.atkAnim=10;
  const dx=target.x-attacker.x;
  if(Math.abs(dx)<55&&attacker.stun===0){
    if(target.blocking&&Math.sign(dx)!==target.facing){target.stun=8;attacker.vx-=attacker.facing*2;}
    else{const dmg=15+Math.floor(Math.random()*10);target.hp=Math.max(0,target.hp-dmg);target.hitFlash=10;target.vx=attacker.facing*3;target.vy=-2;}
  }
}
function update(){
  for(const p of players){
    if(p.stun>0)p.stun--;
    if(p.atkCd>0)p.atkCd--;if(p.atkAnim>0)p.atkAnim--;if(p.hitFlash>0)p.hitFlash--;if(p.blockCd>0)p.blockCd--;
    if(p.stun===0)input(p);
    p.vy+=0.35;p.x+=p.vx;p.y+=p.vy;
    p.x=Math.max(10,Math.min(GW-10,p.x));
    if(p.y>=FLOOR){p.y=FLOOR;p.vy=0;p.airborne=false;}
    if(p.vx>0&&!p.isAI)p.vx=0;else if(p.isAI&&Math.abs(p.vx)<.1){}else p.vx*=.8;
  }
  for(const p of players)if(p.hp<=0){endRound(1-p.idx);}
  document.getElementById('hH1').textContent=Math.ceil(players[0].hp);
  document.getElementById('hH2').textContent=Math.ceil(players[1].hp);
}
function endRound(winner){
  wins[winner]++;
  if(round>=3||wins[winner]>=2){running=false;document.getElementById('hud').style.display='none';document.getElementById('goTxt').textContent=(winner===0?'P1':'P2')+' WINS! 🏆';document.getElementById('gameOver').style.display='flex';}
  else{round++;startRound();}
}
function draw(){
  ctx.fillStyle='#080810';ctx.fillRect(0,0,GW,GH);
  // Stage
  ctx.fillStyle='#1e1832';ctx.fillRect(0,FLOOR+30,GW,40);
  ctx.fillStyle='#2d2448';ctx.fillRect(0,FLOOR+28,GW,6);
  // BG
  ctx.fillStyle='rgba(168,85,247,.03)';for(let i=0;i<GW;i+=20)ctx.fillRect(i,0,1,GH);
  for(const p of players){
    ctx.save();ctx.translate(p.x,p.y);ctx.scale(p.facing,1);
    const flash=p.hitFlash%2===0;
    ctx.fillStyle=flash&&p.hitFlash>0?'#fff':(p.blocking?p.col2:p.col);
    ctx.shadowColor=p.col;ctx.shadowBlur=flash?0:12;
    // Body
    ctx.fillRect(-p.w/2,-p.h,p.w,p.h);
    // Attack arm
    if(p.atkAnim>0){ctx.fillStyle='#fff';ctx.fillRect(p.w/2,-p.h*.6,12,5);}
    // Block shield
    if(p.blocking){ctx.fillStyle='rgba(255,255,255,.3)';ctx.fillRect(p.w/2,-p.h*.8,8,p.h*.7);}
    ctx.restore();ctx.shadowBlur=0;
    // HP bar
    ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(p.x-20,p.y-p.h-12,40,5);ctx.fillStyle=p.col;ctx.fillRect(p.x-20,p.y-p.h-12,40*(p.hp/p.maxHp),5);
  }
  // Win indicators
  for(let i=0;i<wins[0];i++){ctx.fillStyle='#a855f7';ctx.beginPath();ctx.arc(20+i*14,12,5,0,Math.PI*2);ctx.fill();}
  for(let i=0;i<wins[1];i++){ctx.fillStyle='#ec4899';ctx.beginPath();ctx.arc(GW-20-i*14,12,5,0,Math.PI*2);ctx.fill();}
}
(function(){if(!('ontouchstart' in window)&&!navigator.maxTouchPoints)return;const K=keys;function proc(t,v){const r=t.clientX/W;if(r<.2){K.a=K.A=K.ArrowLeft=v;}else if(r>.8){K.d=K.D=K.ArrowRight=v;}else if(r<.5){K.w=K.W=K.ArrowUp=v;}else if(r<.7){K.j=K.J=v;}else{K.k=K.K=v;}}canvas.addEventListener('touchstart',e=>{e.preventDefault();for(const t of e.changedTouches)proc(t,true);},{passive:false});canvas.addEventListener('touchmove',e=>{e.preventDefault();K.a=K.A=K.ArrowLeft=K.d=K.D=K.ArrowRight=K.w=K.W=K.ArrowUp=K.j=K.J=K.k=K.K=false;for(const t of e.touches)proc(t,true);},{passive:false});canvas.addEventListener('touchend',e=>{e.preventDefault();K.a=K.A=K.ArrowLeft=K.d=K.D=K.ArrowRight=K.w=K.W=K.ArrowUp=K.j=K.J=K.k=K.K=false;for(const t of e.touches)proc(t,true);},{passive:false});})();
function loop(){if(running){try{update();}catch(e){console.error('[pixel-duel]',e);running=false;}}try{draw();}catch(e){console.error('[pixel-duel draw]',e);}requestAnimationFrame(loop);}
requestAnimationFrame(loop);

// ===== ONLINE MULTIPLAYER =====
const MP_WORKER='https://germ-fun.kennardxia.workers.dev';const MP_GAME='pixelduel';
let mpWs=null,mpPlayerId=null,mpPeers={},mpConnected=false,mpSendTimer=0;
function openMultiplayer(){
  let ov=document.getElementById('mpOverlay');
  if(!ov){
    ov=document.createElement('div');ov.id='mpOverlay';
    ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:150;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.2rem;backdrop-filter:blur(12px)';
    ov.innerHTML='<h2 style="font-size:1.8rem;font-weight:900;color:#ef4444">🌐 Online Duel</h2><p style="color:#64748b">1v1 fighter — best of 3 rounds</p><div style="display:flex;gap:1rem;flex-wrap:wrap;justify-content:center"><div style="background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:1.2rem;text-align:center;min-width:160px"><div style="font-size:.7rem;color:#64748b;margin-bottom:.6rem;text-transform:uppercase;letter-spacing:.05em">Create Room</div><button onclick="mpCreate()" style="background:linear-gradient(135deg,#ef4444,#ef4444aa);border:none;color:#fff;padding:.6rem 1.4rem;border-radius:10px;font-weight:800;cursor:pointer">+ Create</button><div id="mpCode" style="margin-top:.8rem;font-size:1.6rem;font-weight:900;color:#f59e0b;letter-spacing:.2em;display:none"></div></div><div style="background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:1.2rem;text-align:center;min-width:160px"><div style="font-size:.7rem;color:#64748b;margin-bottom:.6rem;text-transform:uppercase;letter-spacing:.05em">Join Room</div><input id="mpCodeInput" maxlength="6" placeholder="XXXXXX" style="background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.15);color:#e2e8f0;padding:.5rem .8rem;border-radius:8px;font-size:1rem;width:120px;text-align:center;text-transform:uppercase"><br><br><button onclick="mpJoin()" style="background:linear-gradient(135deg,#ef4444,#ef4444aa);border:none;color:#fff;padding:.6rem 1.4rem;border-radius:10px;font-weight:800;cursor:pointer">→ Join</button></div></div><div id="mpStatus" style="font-size:.82rem;color:#94a3b8"></div><div id="mpPlayers" style="font-size:.78rem;color:#64748b"></div><button onclick="document.getElementById(\'mpOverlay\').style.display=\'none\'" style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#94a3b8;padding:.5rem 1.2rem;border-radius:10px;cursor:pointer;margin-top:.4rem">✕ Close</button>';
    document.body.appendChild(ov);
  }else{ov.style.display='flex';}
}
async function mpCreate(){
  setMpStatus('Creating room…');
  try{const r=await fetch(MP_WORKER+'/room/create?game='+MP_GAME,{method:'POST'});if(!r.ok)throw 0;const {code}=await r.json();document.getElementById('mpCode').textContent=code;document.getElementById('mpCode').style.display='block';setMpStatus('Share code: '+code);mpConnect(code);}catch{setMpStatus('⚠ Server unreachable. Play offline.');}
}
function mpJoin(){const c=(document.getElementById('mpCodeInput').value||'').trim().toUpperCase();if(c.length!==6){setMpStatus('Enter a 6-character room code');return;}mpConnect(c);}
function mpConnect(code){
  setMpStatus('Connecting…');
  if(mpWs){try{mpWs.close();}catch{}}
  try{
    mpWs=new WebSocket(MP_WORKER.replace('https','wss')+'/room/'+code+'/ws?game='+MP_GAME);
    mpWs.onopen=()=>setMpStatus('Connected — room '+code);
    mpWs.onclose=()=>{mpConnected=false;mpWs=null;mpPeers={};setMpStatus('Disconnected');};
    mpWs.onerror=()=>setMpStatus('⚠ Connection failed');
    mpWs.onmessage=(ev)=>{
      let d;try{d=JSON.parse(ev.data);}catch{return;}
      if(!d||typeof d!=='object')return;
      if(d.type==='welcome'){mpPlayerId=d.id;mpConnected=true;setMpStatus('✓ In room — Player '+d.count);setMpPlayerCount(d.count);const ov=document.getElementById('mpOverlay');if(ov)ov.style.display='none';startGame('1p');}
      else if(d.type==='join'){setMpPlayerCount(d.count);}
      else if(d.type==='leave'){delete mpPeers[d.id];}
      else if(d.type==='state'&&d.from&&d.from!==mpPlayerId){mpPeers[d.from]={x:+d.x||0,y:+d.y||0,hp:Math.max(0,+d.hp||0),facing:+d.facing||1};}
    };
  }catch{setMpStatus('⚠ WebSocket unavailable');}
}
function setMpStatus(m){const el=document.getElementById('mpStatus');if(el)el.textContent=m;}
function setMpPlayerCount(n){const el=document.getElementById('mpPlayers');if(el)el.textContent='Players in room: '+n;}
const _mpOrigdraw=draw;
draw=function(){
  _mpOrigdraw();
  if(mpConnected&&mpWs&&mpWs.readyState===1){mpSendTimer++;if(mpSendTimer>=3){mpSendTimer=0;try{mpWs.send(JSON.stringify({type:'state',x:players&&players[0]?players[0].x:0,y:players&&players[0]?players[0].y:0,hp:players&&players[0]?players[0].hp:100,facing:players&&players[0]?players[0].facing:1}));}catch{}}}
  if(!mpConnected||!Object.keys(mpPeers).length)return;
  let _gi=0;
  for(const _id in mpPeers){
    const _p=mpPeers[_id];_gi++;
    const _cx=typeof _p.x==='number'?_p.x:0;
    const _cy=typeof _p.y==='number'?_p.y:0;
    ctx.save();
    ctx.globalAlpha=0.55;
    ctx.beginPath();ctx.arc(_cx,_cy,14,0,Math.PI*2);
    ctx.fillStyle='#ef4444';ctx.fill();
    ctx.font='bold 9px Segoe UI';ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('P'+(_gi+1),_cx,_cy);
    ctx.globalAlpha=1;
    // HP bar
    if(typeof _p.hp==='number'){
      ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(_cx-14,_cy+17,28,5);
      ctx.fillStyle='#ef4444';ctx.fillRect(_cx-14,_cy+17,28*(_p.hp/100),5);
    }
    ctx.restore();
  }
};
</script></body></html>
