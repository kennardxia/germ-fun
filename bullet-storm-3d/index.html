<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bullet Storm 3D — germ.fun</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center}
canvas{display:block;touch-action:none}
#menu{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(244,114,182,.08) 0%,transparent 70%),#0a0a0f;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.3rem;z-index:100}
#menu h1{font-size:clamp(2rem,6vw,4rem);font-weight:900;background:linear-gradient(135deg,#f472b6,#fb923c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.02em}
.mcard{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:1.1rem 1.6rem;cursor:pointer;transition:.18s;text-align:center;min-width:140px}
.mcard:hover{background:rgba(255,255,255,.08);border-color:rgba(244,114,182,.4);transform:translateY(-2px)}
.mrow{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center}
.mi{font-size:2rem;margin-bottom:.4rem}
.mcard h3{font-size:.9rem;font-weight:700;color:#f472b6}
.mcard p{font-size:.73rem;color:#64748b;margin-top:.2rem}
.bigbtn{background:linear-gradient(135deg,#f472b6,#fb923c);border:none;color:#fff;padding:.8rem 3rem;border-radius:12px;font-size:1rem;font-weight:800;cursor:pointer;transition:.2s}
.bigbtn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(244,114,182,.3)}
#hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:.6rem 1rem;pointer-events:none;z-index:50}
.hbox{background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:.35rem .7rem;font-size:.78rem;font-weight:700}
.hval{font-size:1.2rem;font-weight:900;color:#f472b6}
#waveMsg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(2rem,7vw,5rem);font-weight:900;color:#fff;text-shadow:0 0 60px #f472b6;opacity:0;pointer-events:none;z-index:80;transition:.2s}
#waveMsg.show{opacity:1}
#gameOver{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;flex-direction:column;align-items:center;justify-content:center;gap:1rem;z-index:90}
</style>
</head>
<body>
<div id="menu">
  <h1>💥 BULLET STORM 3D</h1>
  <p style="color:#64748b">Isometric bullet hell — survive 30 waves</p>
  <div class="mrow">
    <div class="mcard" onclick="startGame('pc')"><div class="mi">🖥️</div><h3>PC Mode</h3><p>WASD + mouse aim</p></div>
    <div class="mcard" onclick="startGame('mobile')"><div class="mi">📱</div><h3>Mobile</h3><p>Joystick + tap fire</p></div>
  </div>
  <a href="../" style="color:#475569;font-size:.82rem">← Games</a>
  <a href="../bullet-storm/" style="color:#475569;font-size:.78rem">▶ Play 2D version</a>
</div>

<div id="hud" style="display:none">
  <div class="hbox">Wave <span class="hval" id="hWave">1</span></div>
  <div class="hbox">HP <span class="hval" id="hHP">100</span></div>
  <div class="hbox">Score <span class="hval" id="hScore">0</span></div>
  <div class="hbox">Weapon <span class="hval" id="hWeapon">Pistol</span></div>
</div>

<div id="waveMsg"></div>
<div id="gameOver">
  <h2 style="font-size:2.5rem;font-weight:900;color:#f472b6">GAME OVER</h2>
  <div style="font-size:1.2rem;color:#94a3b8">Score: <span id="goScore" style="color:#f59e0b;font-weight:900"></span></div>
  <button class="bigbtn" onclick="startGame(lastMode)">↩ Retry</button>
  <a href="../" style="color:#475569;font-size:.82rem">← Games</a>
</div>

<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const isLowEnd=navigator.hardwareConcurrency<=4;
let W,H;
function resize(){W=canvas.width=Math.min(window.innerWidth,900);H=canvas.height=Math.min(window.innerHeight,700);canvas.style.margin='auto';}
resize();window.addEventListener('resize',resize);

// Isometric helpers
const ISO={
  // Isometric projection: world (x,y) -> screen
  toScreen(wx,wy,wz=0){
    const sx=W/2+(wx-wy)*Math.SQRT2/2;
    const sy=H/2+(wx+wy)*Math.SQRT2/4-wz;
    return{x:sx,y:sy};
  },
  // Tile size
  TILE:36,
  ARENA:12, // half-size in tiles
};

// Game state
let running=false,lastMode='pc';
let player,enemies=[],bullets=[],eBullets=[];
let score=0,wave=0,spawnQueue=0;
let waveTimer=0,waveDelay=120;
let gameOver=false;
let mouseX=W/2,mouseY=H/2;

const WEAPONS=[
  {name:'Pistol',dmg:20,rate:15,spd:8,col:'#f59e0b',spread:0,piercing:false},
  {name:'SMG',dmg:10,rate:4,spd:10,col:'#38bdf8',spread:.15,piercing:false},
  {name:'Shotgun',dmg:35,rate:25,spd:7,col:'#fb923c',spread:.4,piercing:false},
  {name:'Laser',dmg:8,rate:2,spd:20,col:'#f472b6',spread:0,piercing:true},
  {name:'Rocket',dmg:80,rate:45,spd:5,col:'#a78bfa',spread:.05,piercing:true},
  {name:'Plasma',dmg:50,rate:20,spd:12,col:'#34d399',spread:.08,piercing:false},
];

const ENEMY_TYPES=[
  {name:'Drone',hp:30,spd:.9,col:'#f87171',size:18,pattern:'orbit'},
  {name:'Tank',hp:120,spd:.45,col:'#fb923c',size:30,pattern:'charge'},
  {name:'Sniper',hp:20,spd:1.1,col:'#38bdf8',size:14,pattern:'flank'},
  {name:'Swarm',hp:12,spd:2,col:'#facc15',size:10,pattern:'rush'},
  {name:'Boss',hp:600,spd:.6,col:'#a78bfa',size:48,pattern:'boss'},
];

function mkPlayer(){
  return{x:0,y:0,z:0,vx:0,vy:0,hp:100,maxHp:100,wpn:0,fireTimer:0,invul:0,speed:3.5,isoH:24};
}

function startGame(mode){
  lastMode=mode;
  player=mkPlayer();
  enemies=[];bullets=[];eBullets=[];
  score=0;wave=0;gameOver=false;
  spawnQueue=0;waveTimer=0;
  document.getElementById('menu').style.display='none';
  document.getElementById('gameOver').style.display='none';
  document.getElementById('hud').style.display='flex';
  setupInput(mode);
  running=true;
  nextWave();
}

function nextWave(){
  wave++;
  spawnQueue=5+wave*3+(wave>5?wave*2:0);
  waveTimer=waveDelay;
  showWaveMsg('WAVE '+wave);
  updateHUD();
}

function showWaveMsg(txt){
  const el=document.getElementById('waveMsg');
  el.textContent=txt;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),1500);
}

// Input
const keys={};let fireHeld=false;
function setupInput(mode){
  keys.w=keys.a=keys.s=keys.d=false;
  canvas.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY;});
  window.addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;if(['1','2','3','4','5','6'].includes(e.key))player.wpn=+e.key-1;});
  window.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
  canvas.addEventListener('mousedown',e=>{if(e.button===0)fireHeld=true;});
  canvas.addEventListener('mouseup',e=>{if(e.button===0)fireHeld=false;});
}

// Aim angle from mouse to player screen pos
function getAimAngle(){
  const ps=ISO.toScreen(player.x,player.y,player.z+player.isoH);
  return Math.atan2(mouseY-ps.y,mouseX-ps.x);
}

function fireBullet(){
  const w=WEAPONS[player.wpn];
  const shots=player.wpn===2?5:1;
  const aimA=getAimAngle();
  for(let i=0;i<shots;i++){
    const a=aimA+(Math.random()-.5)*w.spread*(shots>1?i/shots*2:1);
    // Convert screen aim to world velocity
    const wx=Math.cos(a)*w.spd,wy=Math.sin(a)*w.spd;
    bullets.push({x:player.x,y:player.y,z:player.z+player.isoH*.5,
      vx:wx*Math.SQRT2/2+wy*Math.SQRT2/2,
      vy:(-wx*Math.SQRT2/2+wy*Math.SQRT2/2)*2,
      vz:0,
      dmg:w.dmg,col:w.col,life:60,piercing:w.piercing,hit:0});
  }
}

function spawnEnemy(){
  const isBoss=wave%5===0&&spawnQueue===1;
  const type=isBoss?ENEMY_TYPES[4]:ENEMY_TYPES[Math.floor(Math.random()*4)];
  const angle=Math.random()*Math.PI*2;
  const dist=ISO.ARENA*ISO.TILE*.85;
  enemies.push({
    x:Math.cos(angle)*dist,y:Math.sin(angle)*dist,z:0,
    hp:type.hp*(1+wave*.1),maxHp:type.hp*(1+wave*.1),
    spd:type.spd,col:type.col,size:type.size,pattern:type.pattern,
    fireTimer:60+Math.random()*60,angle:angle,orbitDir:Math.random()<.5?1:-1,
    isoH:type.size,
  });
}

function updateEnemies(){
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    const dx=player.x-e.x,dy=player.y-e.y;
    const dist=Math.sqrt(dx*dx+dy*dy)||1;
    const nx=dx/dist,ny=dy/dist;

    if(e.pattern==='orbit'){
      e.angle+=e.orbitDir*.025;
      const od=200;
      const tx=Math.cos(e.angle)*od,ty=Math.sin(e.angle)*od;
      e.x+=(tx-e.x)*.04;e.y+=(ty-e.y)*.04;
      e.fireTimer--;if(e.fireTimer<=0){fireEnemy(e);e.fireTimer=50+Math.random()*30;}
    } else if(e.pattern==='charge'){
      e.x+=nx*e.spd;e.y+=ny*e.spd;
      if(dist<e.size+20){hurtPlayer(15);}
      e.fireTimer--;if(e.fireTimer<=0){fireEnemy(e);e.fireTimer=80;}
    } else if(e.pattern==='flank'){
      const flankA=Math.atan2(dy,dx)+Math.PI*.4;
      e.x+=Math.cos(flankA)*e.spd*1.2;e.y+=Math.sin(flankA)*e.spd*1.2;
      e.fireTimer--;if(e.fireTimer<=0){fireEnemy(e);e.fireTimer=35;}
    } else if(e.pattern==='rush'){
      e.x+=nx*e.spd;e.y+=ny*e.spd;
      if(dist<e.size+16){hurtPlayer(8);}
    } else if(e.pattern==='boss'){
      e.x+=nx*e.spd*.7;e.y+=ny*e.spd*.7;
      e.fireTimer--;if(e.fireTimer<=0){
        // Boss fires 8-way spread
        for(let a=0;a<8;a++){const ang=a*Math.PI/4;eBullets.push({x:e.x,y:e.y,z:e.isoH*.5,vx:Math.cos(ang)*3,vy:Math.sin(ang)*3,vz:0,dmg:18,life:120});}
        e.fireTimer=40;
      }
    }
    // Clamp to arena
    const maxR=ISO.ARENA*ISO.TILE;
    const er=Math.sqrt(e.x*e.x+e.y*e.y);if(er>maxR){e.x=e.x/er*maxR;e.y=e.y/er*maxR;}
  }
}

function fireEnemy(e){
  const dx=player.x-e.x,dy=player.y-e.y,d=Math.sqrt(dx*dx+dy*dy)||1;
  const spd=4+wave*.2;
  eBullets.push({x:e.x,y:e.y,z:e.isoH*.5,vx:dx/d*spd,vy:dy/d*spd,vz:0,dmg:10+wave*1.5,life:90});
}

function hurtPlayer(dmg){
  if(player.invul>0)return;
  player.hp=Math.max(0,player.hp-dmg);
  player.invul=45;
  if(player.hp<=0)endGame();
}

function updateBullets(){
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    b.x+=b.vx;b.y+=b.vy;b.z+=b.vz;b.life--;
    if(b.life<=0){bullets.splice(i,1);continue;}
    let hit=false;
    for(let j=enemies.length-1;j>=0;j--){
      const e=enemies[j];
      const dx=b.x-e.x,dy=b.y-e.y;
      if(Math.sqrt(dx*dx+dy*dy)<e.size*.7){
        e.hp-=b.dmg;
        if(!b.piercing){hit=true;}
        if(e.hp<=0){score+=Math.ceil(e.maxHp*.5);enemies.splice(j,1);}
        break;
      }
    }
    if(hit){bullets.splice(i,1);}
  }
  for(let i=eBullets.length-1;i>=0;i--){
    const b=eBullets[i];
    b.x+=b.vx;b.y+=b.vy;b.life--;
    if(b.life<=0){eBullets.splice(i,1);continue;}
    const dx=b.x-player.x,dy=b.y-player.y;
    if(Math.sqrt(dx*dx+dy*dy)<20){hurtPlayer(b.dmg);eBullets.splice(i,1);}
  }
}

function updatePlayer(){
  const spd=player.speed;
  let mvx=0,mvy=0;
  if(keys.w||keys.arrowup){mvx-=spd*.7;mvy-=spd*.7;}
  if(keys.s||keys.arrowdown){mvx+=spd*.7;mvy+=spd*.7;}
  if(keys.a||keys.arrowleft){mvx-=spd*.7;mvy+=spd*.7;}
  if(keys.d||keys.arrowright){mvx+=spd*.7;mvy-=spd*.7;}
  player.x+=mvx;player.y+=mvy;
  const maxR=(ISO.ARENA-1)*ISO.TILE;
  const pr=Math.sqrt(player.x*player.x+player.y*player.y);
  if(pr>maxR){player.x=player.x/pr*maxR;player.y=player.y/pr*maxR;}
  player.invul=Math.max(0,player.invul-1);
  player.fireTimer=Math.max(0,player.fireTimer-1);
  if(fireHeld&&player.fireTimer===0){fireBullet();player.fireTimer=WEAPONS[player.wpn].rate;}
}

function updateWave(){
  if(enemies.length===0&&spawnQueue===0){
    if(wave>=30){showWaveMsg('YOU WIN!');endGame(true);return;}
    waveTimer--;if(waveTimer<=0)nextWave();
    return;
  }
  if(spawnQueue>0&&Math.random()<.04){spawnEnemy();spawnQueue--;}
}

function endGame(win=false){
  running=false;
  document.getElementById('hud').style.display='none';
  if(win){showWaveMsg('YOU WIN! 🏆');setTimeout(()=>{document.getElementById('goScore').textContent=score;document.getElementById('gameOver').style.display='flex';},2000);}
  else{document.getElementById('goScore').textContent=score;document.getElementById('gameOver').style.display='flex';}
}

function updateHUD(){
  document.getElementById('hWave').textContent=wave;
  document.getElementById('hHP').textContent=Math.max(0,Math.ceil(player.hp));
  document.getElementById('hScore').textContent=score;
  document.getElementById('hWeapon').textContent=WEAPONS[player.wpn].name;
}

// ===== DRAW =====
function drawFloor(){
  ctx.save();
  const a=ISO.ARENA;
  const t=ISO.TILE;
  for(let gx=-a;gx<a;gx++){
    for(let gy=-a;gy<a;gy++){
      const p0=ISO.toScreen(gx*t,gy*t);
      const p1=ISO.toScreen((gx+1)*t,gy*t);
      const p2=ISO.toScreen((gx+1)*t,(gy+1)*t);
      const p3=ISO.toScreen(gx*t,(gy+1)*t);
      const d=(Math.abs(gx)+Math.abs(gy))%2;
      ctx.beginPath();ctx.moveTo(p0.x,p0.y);ctx.lineTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.lineTo(p3.x,p3.y);ctx.closePath();
      ctx.fillStyle=d?'rgba(244,114,182,.1)':'rgba(251,146,60,.08)';
      ctx.strokeStyle='rgba(255,255,255,.08)';ctx.lineWidth=.5;
      ctx.fill();ctx.stroke();
    }
  }
  ctx.restore();
}

function drawShadow(wx,wy){
  const ps=ISO.toScreen(wx,wy,0);
  ctx.save();ctx.globalAlpha=.25;ctx.fillStyle='rgba(0,0,0,.6)';ctx.beginPath();ctx.ellipse(ps.x,ps.y,16,8,0,0,Math.PI*2);ctx.fill();ctx.restore();
}

function drawIsoBox(wx,wy,wz,w2,h2,col,emissive=false){
  const t=w2/2,s=h2;
  const top=ISO.toScreen(wx,wy,wz+s);
  const tl=ISO.toScreen(wx-t,wy-t,wz+s);
  const tr=ISO.toScreen(wx+t,wy-t,wz+s);
  const br=ISO.toScreen(wx+t,wy+t,wz+s);
  const bl=ISO.toScreen(wx-t,wy+t,wz+s);
  const btl=ISO.toScreen(wx-t,wy-t,wz);
  const btr=ISO.toScreen(wx+t,wy-t,wz);
  const bbr=ISO.toScreen(wx+t,wy+t,wz);
  const bbl=ISO.toScreen(wx-t,wy+t,wz);
  ctx.save();
  if(emissive){ctx.shadowColor=col;ctx.shadowBlur=18;}
  // Top face
  ctx.beginPath();ctx.moveTo(tl.x,tl.y);ctx.lineTo(tr.x,tr.y);ctx.lineTo(br.x,br.y);ctx.lineTo(bl.x,bl.y);ctx.closePath();
  ctx.fillStyle=col;ctx.fill();
  // Left face
  ctx.beginPath();ctx.moveTo(bl.x,bl.y);ctx.lineTo(tl.x,tl.y);ctx.lineTo(btl.x,btl.y);ctx.lineTo(bbl.x,bbl.y);ctx.closePath();
  ctx.fillStyle=shadeColor(col,-.3);ctx.fill();
  // Right face
  ctx.beginPath();ctx.moveTo(br.x,br.y);ctx.lineTo(tr.x,tr.y);ctx.lineTo(btr.x,btr.y);ctx.lineTo(bbr.x,bbr.y);ctx.closePath();
  ctx.fillStyle=shadeColor(col,-.15);ctx.fill();
  ctx.restore();
}

function shadeColor(hex,pct){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.max(0,Math.min(255,Math.round(r*(1+pct))));
  g=Math.max(0,Math.min(255,Math.round(g*(1+pct))));
  b=Math.max(0,Math.min(255,Math.round(b*(1+pct))));
  return`#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

function draw(){
  ctx.clearRect(0,0,W,H);
  // Background
  ctx.fillStyle='#0a0a0f';ctx.fillRect(0,0,W,H);
  drawFloor();
  // Sort by y+x for painter's algorithm
  const all=[
    ...enemies.map(e=>({...e,_type:'enemy'})),
    {_type:'player',...player},
    ...bullets.map(b=>({...b,_type:'pbullet'})),
    ...eBullets.map(b=>({...b,_type:'ebullet'})),
  ].sort((a,b)=>a.x+a.y-(b.x+b.y));

  for(const obj of all){
    if(obj._type==='player'){
      if(player.invul%6<3&&player.hp>0)continue;
      drawShadow(player.x,player.y);
      drawIsoBox(player.x,player.y,0,20,22,'#38bdf8',true);
      // Aim indicator
      const aimA=getAimAngle();
      const ps=ISO.toScreen(player.x,player.y,22);
      ctx.save();ctx.strokeStyle='#38bdf8';ctx.globalAlpha=.6;ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(ps.x,ps.y);ctx.lineTo(ps.x+Math.cos(aimA)*28,ps.y+Math.sin(aimA)*28);ctx.stroke();ctx.restore();
      // HP bar
      const hs=ISO.toScreen(player.x,player.y,34);
      ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(hs.x-18,hs.y-4,36,6);
      ctx.fillStyle='#34d399';ctx.fillRect(hs.x-18,hs.y-4,36*(player.hp/player.maxHp),6);
    } else if(obj._type==='enemy'){
      drawShadow(obj.x,obj.y);
      drawIsoBox(obj.x,obj.y,0,obj.size*.7,obj.size*.6,obj.col,true);
      // HP bar
      const hp=obj.hp/obj.maxHp;
      const hs=ISO.toScreen(obj.x,obj.y,obj.isoH+8);
      ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(hs.x-20,hs.y-3,40,5);
      ctx.fillStyle=hp>.5?'#34d399':'#f87171';ctx.fillRect(hs.x-20,hs.y-3,40*hp,5);
    } else if(obj._type==='pbullet'){
      const ps=ISO.toScreen(obj.x,obj.y,obj.z);
      ctx.save();ctx.fillStyle=obj.col;ctx.shadowColor=obj.col;ctx.shadowBlur=8;
      ctx.beginPath();ctx.arc(ps.x,ps.y,4,0,Math.PI*2);ctx.fill();ctx.restore();
    } else if(obj._type==='ebullet'){
      const ps=ISO.toScreen(obj.x,obj.y,obj.z);
      ctx.save();ctx.fillStyle='#f87171';ctx.shadowColor='#f87171';ctx.shadowBlur=6;
      ctx.beginPath();ctx.arc(ps.x,ps.y,4,0,Math.PI*2);ctx.fill();ctx.restore();
    }
  }
  ctx.shadowBlur=0;
  updateHUD();
}

function loop(){
  if(running){
    updatePlayer();
    updateEnemies();
    updateBullets();
    updateWave();
  }
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
