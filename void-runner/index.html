<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Void Runner — GERM.FUN</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden}
canvas{position:fixed;inset:0;width:100%;height:100%}
.card{position:relative;z-index:10;text-align:center;padding:2.5rem 2rem;background:rgba(0,0,0,.55);border:1px solid rgba(99,102,241,.25);border-radius:20px;max-width:380px;backdrop-filter:blur(16px)}
.badge{display:inline-block;background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.4);color:#818cf8;font-size:.65rem;font-weight:800;letter-spacing:.2em;padding:.3rem .8rem;border-radius:20px;text-transform:uppercase;margin-bottom:1rem}
.ico{font-size:4rem;margin-bottom:.8rem}
h1{font-size:2.5rem;font-weight:900;color:#fff;margin-bottom:.4rem;letter-spacing:-1px}
p{font-size:.9rem;color:#94a3b8;line-height:1.6;margin-bottom:1.5rem}
.features{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;margin-bottom:1.5rem}
.feat{background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.2);color:#818cf8;font-size:.72rem;padding:.25rem .65rem;border-radius:8px}
a.back{display:inline-block;color:#64748b;font-size:.82rem;text-decoration:none;border:1px solid rgba(255,255,255,.08);padding:.4rem 1rem;border-radius:8px}
a.back:hover{color:#818cf8}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="card">
  <div class="badge">Coming Soon</div>
  <div class="ico">🌀</div>
  <h1>VOID RUNNER</h1>
  <p>Sprint through collapsing void dimensions. Wall-run, phase through portals, and outsmart deadly AI hunters in this futuristic parkour runner.</p>
  <div class="features">
    <span class="feat">🏃 Parkour Chain</span>
    <span class="feat">🌀 Portal Jumps</span>
    <span class="feat">🤖 AI Hunters</span>
    <span class="feat">💰 Coin System</span>
    <span class="feat">🎮 PC + Mobile</span>
  </div>
  <a class="back" href="../">← Back to Games</a>
</div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
let W,H;function resize(){W=c.width=innerWidth;H=c.height=innerHeight;}resize();window.addEventListener('resize',resize);
const COL='#6366f1';
let t=0;
function loop(){
  t+=.02;
  ctx.fillStyle='rgba(0,0,5,.15)';ctx.fillRect(0,0,W,H);
  for(let i=0;i<6;i++){
    const r=50+i*40+Math.sin(t+i)*20;
    const cx2=W/2,cy2=H/2;
    ctx.beginPath();ctx.arc(cx2,cy2,r*Math.min(W,H)/600,0,Math.PI*2);
    ctx.strokeStyle=COL+(Math.floor(30+i*12).toString(16).padStart(2,'0'));ctx.lineWidth=1;ctx.stroke();
  }
  // Flowing lines
  for(let i=0;i<5;i++){
    const y=H/2+Math.sin(t*1.2+i*1.3)*H*.35;
    ctx.beginPath();ctx.moveTo(0,y);
    for(let x=0;x<W;x+=8){ctx.lineTo(x,y+Math.sin(t*2+x*.01+i)*15);}
    ctx.strokeStyle=COL+(Math.floor(20+i*8).toString(16).padStart(2,'0'));ctx.lineWidth=1;ctx.stroke();
  }
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
