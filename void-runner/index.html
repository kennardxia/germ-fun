<!DOCTYPE html>
<!--v4--><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Void Runner — germ.fun</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#040616;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;height:100dvh}canvas{display:block}#menu{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(56,189,248,.06) 0%,transparent 70%),#040616;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.2rem;z-index:100}#menu h1{font-size:clamp(2rem,6vw,4rem);font-weight:900;background:linear-gradient(135deg,#38bdf8,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.mcard{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:1rem 1.4rem;cursor:pointer;transition:.18s;text-align:center;min-width:130px}.mcard:hover{background:rgba(56,189,248,.06);border-color:rgba(56,189,248,.3);transform:translateY(-2px)}.mrow{display:flex;gap:.9rem;flex-wrap:wrap;justify-content:center}.mi{font-size:2rem;margin-bottom:.3rem}.mcard h3{font-size:.88rem;font-weight:700;color:#38bdf8}.mcard p{font-size:.72rem;color:#64748b}.bigbtn{background:linear-gradient(135deg,#38bdf8,#818cf8);border:none;color:#fff;padding:.8rem 3rem;border-radius:12px;font-size:1rem;font-weight:800;cursor:pointer}#hud{position:fixed;top:.5rem;left:.5rem;right:.5rem;display:flex;justify-content:space-between;pointer-events:none;z-index:50}.hb{background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:.3rem .7rem;font-size:.78rem;font-weight:700}.hv{font-size:1.1rem;font-weight:900;color:#38bdf8}#gameOver{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;flex-direction:column;align-items:center;justify-content:center;gap:1rem;z-index:90}</style></head>
<body>
<div id="menu"><h1>🏃 VOID RUNNER</h1><p style="color:#64748b">Run through the void — double jump — slide — collect coins</p><div class="mrow"><div class="mcard" onclick="startGame()"><div class="mi">🎮

</div><h3>Run!</h3><p>Space/W/Up = Jump, S/Down = Slide, tap on mobile</p></div><div class="mcard" onclick="openMultiplayer()" style="border-color:rgba(16,185,129,.35);background:rgba(16,185,129,.05)"><div class="mi">🌐</div><h3 style="color:#34d399">Online MP</h3><p>Race the void</p></div></div><a href="../" style="color:#475569;font-size:.82rem">← Games</a></div>
<div id="hud" style="display:none"><div class="hb">Score <span class="hv" id="hS">0</span></div><div class="hb">Coins <span class="hv" id="hC">0</span></div><div class="hb">Best <span class="hv" id="hB">0</span></div></div>
<div id="gameOver"><h2 style="font-size:2.5rem;font-weight:900;color:#38bdf8">CRASHED!</h2><div style="color:#94a3b8">Score: <span id="goS" style="color:#f59e0b;font-weight:900"></span></div><button class="bigbtn" onclick="startGame()">← Run Again</button>
    <button onclick="openMultiplayer()" style="background:linear-gradient(135deg,#06b6d4,#0891b2);border:none;color:#fff;padding:10px 24px;border-radius:10px;font-size:.9rem;font-weight:700;cursor:pointer;margin-top:8px">🌐 Online</button><a href="../" style="color:#475569;font-size:.82rem">← Games</a></div>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const isLowEnd=navigator.hardwareConcurrency<=4;
let W,H;function resize(){W=canvas.width=Math.min(window.innerWidth,1920);H=canvas.height=Math.min(window.innerHeight,1080);}resize();window.addEventListener('resize',resize);
const GROUND=()=>H-80;
let player,obstacles=[],coins=[],bgPieces=[],score=0,coinCount=0,best=0,running=false,speed=5,frameN=0,spawnTimer=0;
const keys={};
window.addEventListener('keydown',e=>{if(!running)return;if(['w','ArrowUp',' '].includes(e.key.toLowerCase()||e.key))jump();if(['s','arrowdown'].includes(e.key.toLowerCase()))slide();});
canvas.addEventListener('touchstart',e=>{if(!running){startGame();return;}if(e.touches[0].clientY>H/2)slide();else jump();},{passive:false});
function mkPlayer(){return{x:100,y:GROUND(),vy:0,w:28,h:40,jumping:false,jumpCount:0,sliding:false,slideTmr:0,trail:[],dead:false};}
function jump(){if(player.jumpCount<2){player.vy=-11.5;player.jumping=true;player.jumpCount++;player.sliding=false;player.slideTmr=0;}}
function slide(){player.sliding=true;player.slideTmr=25;if(player.jumping){player.vy+=4;}}
function startGame(){player=mkPlayer();obstacles=[];coins=[];speed=5;frameN=0;spawnTimer=0;score=0;coinCount=0;running=true;document.getElementById('menu').style.display='none';document.getElementById('gameOver').style.display='none';document.getElementById('hud').style.display='flex';}
function spawnObstacle(){const t=Math.random();if(t<.5){obstacles.push({x:W+30,y:GROUND()-10,w:22,h:50,type:'block'});}else if(t<.8){obstacles.push({x:W+30,y:GROUND()-40,w:30,h:20,type:'hover'});}else{obstacles.push({x:W+30,y:GROUND()-60,w:16,h:60,type:'tall'});}}
function spawnCoin(){coins.push({x:W+20,y:GROUND()-40-Math.random()*60,r:8,collected:false});}
function update(){
  score++;speed=5+score*.003;
  player.vy+=0.5;player.y+=player.vy;
  const gr=GROUND();
  if(player.y>=gr){player.y=gr;player.vy=0;player.jumping=false;player.jumpCount=0;}
  if(player.slideTmr>0){player.slideTmr--;if(player.slideTmr===0)player.sliding=false;}
  const pw=player.w,ph=player.sliding?18:player.h;const px=player.x,py=player.y+(player.sliding?22:0);
  player.trail.unshift({x:px,y:py,h:ph});if(player.trail.length>8)player.trail.pop();
  spawnTimer--;if(spawnTimer<=0){spawnObstacle();if(Math.random()<.5)spawnCoin();spawnTimer=40+Math.floor(Math.random()*60/(speed/5));}
  for(let i=obstacles.length-1;i>=0;i--){const o=obstacles[i];o.x-=speed;if(o.x+o.w<0){obstacles.splice(i,1);continue;}if(px+pw-4>o.x&&px+4<o.x+o.w&&py+ph>o.y&&py<o.y+o.h){endGame();return;}}
  for(let i=coins.length-1;i>=0;i--){const c=coins[i];c.x-=speed;if(c.x<-20){coins.splice(i,1);continue;}if(!c.collected&&Math.hypot(px+pw/2-c.x,py+ph/2-c.y)<pw/2+c.r){c.collected=true;coinCount++;score+=50;}}
  document.getElementById('hS').textContent=score;document.getElementById('hC').textContent=coinCount;if(score>best)best=score;document.getElementById('hB').textContent=best;
}
function endGame(){running=false;document.getElementById('hud').style.display='none';document.getElementById('goS').textContent=score;document.getElementById('gameOver').style.display='flex';}
function draw(){
  ctx.fillStyle='#040616';ctx.fillRect(0,0,W,H);
  // BG parallax
  ctx.fillStyle='rgba(255,255,255,.5)';
  for(let i=0;i<80;i++){const s=(i*7919+3)%W;const t=(i*6271+score*.2*(i%3+1))%H;ctx.fillRect(s,t,1,1);}
  // Ground
  const gr=GROUND();ctx.fillStyle='#1e293b';ctx.fillRect(0,gr+40,W,H);ctx.fillStyle='#38bdf8';ctx.fillRect(0,gr+38,W,3);
  // Trail
  for(let i=player.trail.length-1;i>=0;i--){const t=player.trail[i];ctx.globalAlpha=(1-i/player.trail.length)*.25;ctx.fillStyle='#38bdf8';ctx.fillRect(t.x,t.y,player.w,t.h);}ctx.globalAlpha=1;
  // Player
  const ph=player.sliding?18:player.h;const py=player.y+(player.sliding?22:0);ctx.save();ctx.fillStyle='#38bdf8';ctx.shadowColor='#38bdf8';ctx.shadowBlur=18;ctx.fillRect(player.x,py,player.w,ph);ctx.restore();ctx.shadowBlur=0;
  // Obstacles
  for(const o of obstacles){ctx.save();ctx.fillStyle='#f87171';ctx.shadowColor='#f87171';ctx.shadowBlur=10;ctx.fillRect(o.x,o.y,o.w,o.h);ctx.restore();ctx.shadowBlur=0;}
  // Coins
  for(const c of coins){if(c.collected)continue;ctx.save();ctx.fillStyle='#fbbf24';ctx.shadowColor='#fbbf24';ctx.shadowBlur=10;ctx.beginPath();ctx.arc(c.x,c.y,c.r,0,Math.PI*2);ctx.fill();ctx.restore();ctx.shadowBlur=0;}
}
function loop(){if(running){try{update();}catch(e){console.error('[void-runner]',e);running=false;}}try{draw();}catch(e){console.error('[void-runner draw]',e);}requestAnimationFrame(loop);}
requestAnimationFrame(loop);

// ===== ONLINE MULTIPLAYER =====
const MP_WORKER='https://germ-fun.kennardxia.workers.dev';const MP_GAME='voidrunner';
let mpWs=null,mpPlayerId=null,mpPeers={},mpConnected=false,mpSendTimer=0;
function openMultiplayer(){
  let ov=document.getElementById('mpOverlay');
  if(!ov){
    ov=document.createElement('div');ov.id='mpOverlay';
    ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:150;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.2rem;backdrop-filter:blur(12px)';
    ov.innerHTML='<h2 style="font-size:1.8rem;font-weight:900;color:#06b6d4">🌐 Online Race</h2><p style="color:#64748b">Run the void — highest score wins</p><div style="display:flex;gap:1rem;flex-wrap:wrap;justify-content:center"><div style="background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:1.2rem;text-align:center;min-width:160px"><div style="font-size:.7rem;color:#64748b;margin-bottom:.6rem;text-transform:uppercase;letter-spacing:.05em">Create Room</div><button onclick="mpCreate()" style="background:linear-gradient(135deg,#06b6d4,#06b6d4aa);border:none;color:#fff;padding:.6rem 1.4rem;border-radius:10px;font-weight:800;cursor:pointer">+ Create</button><div id="mpCode" style="margin-top:.8rem;font-size:1.6rem;font-weight:900;color:#f59e0b;letter-spacing:.2em;display:none"></div></div><div style="background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:1.2rem;text-align:center;min-width:160px"><div style="font-size:.7rem;color:#64748b;margin-bottom:.6rem;text-transform:uppercase;letter-spacing:.05em">Join Room</div><input id="mpCodeInput" maxlength="6" placeholder="XXXXXX" style="background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.15);color:#e2e8f0;padding:.5rem .8rem;border-radius:8px;font-size:1rem;width:120px;text-align:center;text-transform:uppercase"><br><br><button onclick="mpJoin()" style="background:linear-gradient(135deg,#06b6d4,#06b6d4aa);border:none;color:#fff;padding:.6rem 1.4rem;border-radius:10px;font-weight:800;cursor:pointer">→ Join</button></div></div><div id="mpStatus" style="font-size:.82rem;color:#94a3b8"></div><div id="mpPlayers" style="font-size:.78rem;color:#64748b"></div><button onclick="document.getElementById(\'mpOverlay\').style.display=\'none\'" style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#94a3b8;padding:.5rem 1.2rem;border-radius:10px;cursor:pointer;margin-top:.4rem">✕ Close</button>';
    document.body.appendChild(ov);
  }else{ov.style.display='flex';}
}
async function mpCreate(){
  setMpStatus('Creating room…');
  try{const r=await fetch(MP_WORKER+'/room/create?game='+MP_GAME,{method:'POST'});if(!r.ok)throw 0;const {code}=await r.json();document.getElementById('mpCode').textContent=code;document.getElementById('mpCode').style.display='block';setMpStatus('Share code: '+code);mpConnect(code);}catch{setMpStatus('⚠ Server unreachable. Play offline.');}
}
function mpJoin(){const c=(document.getElementById('mpCodeInput').value||'').trim().toUpperCase();if(c.length!==6){setMpStatus('Enter a 6-character room code');return;}mpConnect(c);}
function mpConnect(code){
  setMpStatus('Connecting…');
  if(mpWs){try{mpWs.close();}catch{}}
  try{
    mpWs=new WebSocket(MP_WORKER.replace('https','wss')+'/room/'+code+'/ws?game='+MP_GAME);
    mpWs.onopen=()=>setMpStatus('Connected — room '+code);
    mpWs.onclose=()=>{mpConnected=false;mpWs=null;mpPeers={};setMpStatus('Disconnected');};
    mpWs.onerror=()=>setMpStatus('⚠ Connection failed');
    mpWs.onmessage=(ev)=>{
      let d;try{d=JSON.parse(ev.data);}catch{return;}
      if(!d||typeof d!=='object')return;
      if(d.type==='welcome'){mpPlayerId=d.id;mpConnected=true;setMpStatus('✓ In room — Player '+d.count);setMpPlayerCount(d.count);const ov=document.getElementById('mpOverlay');if(ov)ov.style.display='none';startGame();}
      else if(d.type==='join'){setMpPlayerCount(d.count);}
      else if(d.type==='leave'){delete mpPeers[d.id];}
      else if(d.type==='state'&&d.from&&d.from!==mpPlayerId){mpPeers[d.from]={y:+d.y||0,score:+d.score||0,alive:!!d.alive};}
    };
  }catch{setMpStatus('⚠ WebSocket unavailable');}
}
function setMpStatus(m){const el=document.getElementById('mpStatus');if(el)el.textContent=m;}
function setMpPlayerCount(n){const el=document.getElementById('mpPlayers');if(el)el.textContent='Players in room: '+n;}
const _mpOrigdraw=draw;
draw=function(){
  _mpOrigdraw();
  if(mpConnected&&mpWs&&mpWs.readyState===1){mpSendTimer++;if(mpSendTimer>=3){mpSendTimer=0;try{mpWs.send(JSON.stringify({type:'state',y:player?player.y:0,vy:player?player.vy:0,score:score||0,alive:running}));}catch{}}}
  if(!mpConnected||!Object.keys(mpPeers).length)return;
  let _gi=0;
  for(const _id in mpPeers){
    const _p=mpPeers[_id];_gi++;
    ctx.save();
    ctx.globalAlpha=0.65;
    ctx.fillStyle='#06b6d4';
    ctx.fillRect(4,(_p.y||0)-8,8,16);
    ctx.font='bold 9px Segoe UI';ctx.fillStyle='#fff';ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillText('P'+(_gi+1),15,(_p.y||0));
    ctx.globalAlpha=1;ctx.restore();
  }
};
</script><script>
(function(){function patch(el){if(el._tf)return;el._tf=1;el.addEventListener('touchend',function(e){e.preventDefault();var fn=el.getAttribute('onclick');if(fn)try{(new Function(fn))();}catch(ex){}},{passive:false});}function run(){document.querySelectorAll('.mode-card,.mcard').forEach(patch);}if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',run);else run();})();
</script>
</body></html>
