<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Miner — GERM.FUN</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden}
canvas{position:fixed;inset:0;width:100%;height:100%}
.card{position:relative;z-index:10;text-align:center;padding:2.5rem 2rem;background:rgba(0,0,0,.55);border:1px solid rgba(124,58,237,.25);border-radius:20px;max-width:380px;backdrop-filter:blur(16px)}
.badge{display:inline-block;background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.4);color:#a78bfa;font-size:.65rem;font-weight:800;letter-spacing:.2em;padding:.3rem .8rem;border-radius:20px;text-transform:uppercase;margin-bottom:1rem}
.ico{font-size:4rem;margin-bottom:.8rem}
h1{font-size:2.5rem;font-weight:900;color:#fff;margin-bottom:.4rem;letter-spacing:-1px}
p{font-size:.9rem;color:#94a3b8;line-height:1.6;margin-bottom:1.5rem}
.features{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;margin-bottom:1.5rem}
.feat{background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.2);color:#a78bfa;font-size:.72rem;padding:.25rem .65rem;border-radius:8px}
a.back{display:inline-block;color:#64748b;font-size:.82rem;text-decoration:none;border:1px solid rgba(255,255,255,.08);padding:.4rem 1rem;border-radius:8px}
a.back:hover{color:#a78bfa}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="card">
  <div class="badge">Coming Soon</div>
  <div class="ico">⛏️</div>
  <h1>SPACE MINER</h1>
  <p>Navigate asteroid fields, extract rare minerals, upgrade your ship and crew. Build a mining empire across the galaxy — one asteroid at a time.</p>
  <div class="features">
    <span class="feat">🪨 Asteroid Mining</span>
    <span class="feat">🚀 Ship Upgrades</span>
    <span class="feat">💎 5 Minerals</span>
    <span class="feat">💰 Coin System</span>
    <span class="feat">🌌 Deep Space</span>
  </div>
  <a class="back" href="../">← Back to Games</a>
</div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
let W,H;function resize(){W=c.width=innerWidth;H=c.height=innerHeight;}resize();window.addEventListener('resize',resize);
const COL='#7c3aed';
const stars=[];for(let i=0;i<120;i++)stars.push({x:Math.random()*1200,y:Math.random()*800,r:Math.random()*1.2+.2,spd:Math.random()*.4+.1});
const asts=[];for(let i=0;i<8;i++)asts.push({x:Math.random()*1200,y:Math.random()*800,r:8+Math.random()*20,rot:Math.random()*Math.PI*2,rotSpd:(Math.random()-.5)*.02,vx:(Math.random()-.5)*.5,vy:(Math.random()-.5)*.5});
function loop(){
  ctx.fillStyle='rgba(3,0,20,.2)';ctx.fillRect(0,0,W,H);
  stars.forEach(s=>{s.x-=s.spd;if(s.x<0)s.x=W;const sx=s.x*W/1200,sy=s.y*H/800;ctx.beginPath();ctx.arc(sx,sy,s.r,0,Math.PI*2);ctx.fillStyle='rgba(167,139,250,.5)';ctx.fill();});
  asts.forEach(a=>{a.x+=a.vx;a.y+=a.vy;a.rot+=a.rotSpd;if(a.x<-30)a.x=W+30;if(a.x>W+30)a.x=-30;if(a.y<-30)a.y=H+30;if(a.y>H+30)a.y=-30;
    const ax=a.x*W/1200,ay=a.y*H/800,ar=a.r*Math.min(W,H)/800;
    ctx.save();ctx.translate(ax,ay);ctx.rotate(a.rot);ctx.beginPath();
    for(let i=0;i<7;i++){const angle=i/7*Math.PI*2;const ri=ar*(0.7+Math.random()*.3);ctx.lineTo(Math.cos(angle)*ri,Math.sin(angle)*ri);}
    ctx.closePath();ctx.fillStyle=COL+'33';ctx.strokeStyle=COL+'88';ctx.lineWidth=1;ctx.fill();ctx.stroke();ctx.restore();
  });
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
