*{margin:0;padding:0;box-sizing:border-box}

button:hover{transform:scale(1.05)}

/* ── Mode Select ── */
#modeScreen{position:fixed;inset:0;background:linear-gradient(135deg,#0a0a1a,#0d0d2e);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:1.8rem;padding:1rem;text-align:center}

.mode-card:hover{border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.08);transform:translateY(-4px)}

<a id="back" href="../index.html">← Back</a>
<div id="hud">
  <div id="hudbars">
    <div id="p1bar">
      <span class="pname" style="color:#22c55e">P1</span>
      <div class="hpbar"><div class="hpfill" id="p1fill" style="width:100%"></div></div>
      <span id="p1hp" style="font-size:.75rem">100</span>
    </div>
    <div id="roundInfo">Round <span id="rndNum">1</span>/3</div>
    <div id="p2bar" style="flex-direction:row-reverse">
      <span class="pname" style="color:#ef4444">P2/CPU</span>
      <div class="hpbar"><div class="hpfill" id="p2fill" style="width:100%"></div></div>
      <span id="p2hp" style="font-size:.75rem">100</span>
    </div>
  </div>
</div>
<div id="modeScreen">
  <h1>⚔️ Pixel Duel 3D</h1>
  <p>Pseudo-3D arena fighter — special moves — best of 3 rounds</p>
  <div class="mode-cards">
    <div class="mode-card" onclick="startGame('1p')">
      <span class="icon">🤖</span>
      <h3>VS CPU</h3>
      <p>Fight AI — best of 3 rounds</p><div class="ctrl-hint">WASD: Move/Jump<br>F: Attack · G: Special</div>
    </div>
    <div class="mode-card mp-card" onclick="openMultiplayer()">
      <span class="icon">🌐</span>
      <h3>Online MP</h3>
      <p>Fight friends via room code</p><div class="ctrl-hint">Up to 6 players</div>
    </div>
  </div>
  <a href="../" style="color:#475569;font-size:.8rem;text-decoration:none;margin-top:.3rem">← Back to Games</a>
</div>
<div id="gameOver">
  <h2 id="goTitle">P1 Wins!</h2>
  <p id="goMsg">Best of 3 complete</p>
  <button onclick="startGame(lastMode)">Rematch</button>
  <button onclick="document.getElementById(\'gameOver\').style.display=\'none\';document.getElementById(\'menu\').style.display=\'flex\'">Menu</button>
</div>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const isLowEnd=navigator.hardwareConcurrency<=4;
const W=640,H=360;canvas.width=W;canvas.height=H;
canvas.style.width=Math.min(window.innerWidth,W*2)+'px';
canvas.style.height='auto';
window.addEventListener('resize',()=>{canvas.style.width=Math.min(window.innerWidth,W*2)+'px';});

// Pseudo-3D: fighters have x,z (floor plane) and y (height for jumping)
const FLOOR_Y=260;
const FIGHTERS=[
  {name:'Blaze',col:'#f97316',special:'Flame Kick',hp:100,str:22,spd:4.5,jumpForce:10,w:28,h:50},
  {name:'Storm',col:'#22d3ee',special:'Thunder Punch',hp:100,str:18,spd:6,jumpForce:12,w:24,h:50},
  {name:'Rock',col:'#78716c',special:'Ground Slam',hp:100,str:32,spd:3.2,jumpForce:8,w:34,h:50},
  {name:'Shadow',col:'#a78bfa',special:'Dark Dash',hp:100,str:20,spd:5.5,jumpForce:11,w:26,h:50},
];

let p1,p2,particles=[],hitFlashes=[];
let round=1,p1Wins=0,p2Wins=0;
let running=false,roundOver=false,roundTimer=0,gameMode='1p';
let lastMode='1p';
const keys={};

function mkFighter(fi,side){
  const f=FIGHTERS[fi];
  return{...f,fi,side,x:side==='left'?140:W-140,y:FLOOR_Y-f.h,z:0,vy:0,
    facing:side==='left'?1:-1,
    hp:f.hp,maxHp:f.hp,
    attackTimer:0,attackActive:false,attackHit:false,
    specialTimer:0,specialActive:false,specialHit:false,
    hitStun:0,blockTimer:0,
    frameState:'idle',animFrame:0,animTimer:0,
    cpu:false};
}

function startGame(mode){
  gameMode=mode;lastMode=mode;
  p1=mkFighter(0,'left');
  p2=mkFighter(2,'right');
  if(mode==='1p')p2.cpu=true;
  particles=[];hitFlashes=[];round=1;p1Wins=0;p2Wins=0;running=true;roundOver=false;
  document.getElementById('modeScreen').style.display='none';
  document.getElementById('gameOver').style.display='none';
  document.getElementById('hud').style.display='block';
  document.getElementById('rndNum').textContent=round;
}

function resetRound(){
  p1.x=140;p1.y=FLOOR_Y-p1.h;p1.vy=0;p1.hp=p1.maxHp;p1.hitStun=0;p1.attackTimer=0;p1.specialTimer=0;
  p2.x=W-140;p2.y=FLOOR_Y-p2.h;p2.vy=0;p2.hp=p2.maxHp;p2.hitStun=0;p2.attackTimer=0;p2.specialTimer=0;
  roundOver=false;particles=[];hitFlashes=[];
}

window.addEventListener('keydown',e=>{keys[e.code]=true;});
window.addEventListener('keyup',e=>{keys[e.code]=false;});

function cpuBrain(cpu,opp){
  // Simple reactive AI
  const dx=opp.x-cpu.x;
  const dist=Math.abs(dx);
  if(cpu.hitStun>0)return;
  // Move toward opponent
  if(dist>100){
    cpu.x+=Math.sign(dx)*cpu.spd*.8;
  }
  // Attack
  if(dist<70&&cpu.attackTimer<=0&&Math.random()<.04)attackAction(cpu,opp);
  if(dist<80&&cpu.specialTimer<=0&&Math.random()<.01)specialAction(cpu,opp);
  // Jump sometimes
  if(cpu.y>=FLOOR_Y-cpu.h&&Math.random()<.005)cpu.vy=-cpu.jumpForce;
  cpu.facing=Math.sign(dx);
}

function attackAction(f,opp){
  if(f.attackTimer>0||f.hitStun>0)return;
  f.attackTimer=22;f.attackActive=true;f.attackHit=false;
}
function specialAction(f,opp){
  if(f.specialTimer>0||f.hitStun>0)return;
  f.specialTimer=45;f.specialActive=true;f.specialHit=false;
}

function resolveHit(attacker,defender,dmg,special){
  if(!special&&attacker.attackHit)return;
  if(special&&attacker.specialHit)return;
  const dx=defender.x-attacker.x;
  if(Math.abs(dx)>100)return;
  defender.hp-=dmg;
  defender.hitStun=18;
  if(special)attacker.specialHit=true;else attacker.attackHit=true;
  // Knockback
  defender.x+=Math.sign(dx)*35;
  // Sparks
  const px=(attacker.x+defender.x)*.5,py=defender.y+defender.h*.4;
  if(!isLowEnd||Math.random()<.7){
    for(let i=0;i<8;i++){
      const a=Math.random()*Math.PI*2,sp=2+Math.random()*3;
      particles.push({x:px,y:py,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:20,col:attacker.col,r:2.5});
    }
  }
  hitFlashes.push({x:px,y:py,life:10,col:attacker.col,txt:special?attacker.special:'HIT!'});
}

function update(){
  if(!running||roundOver)return;
  // P1 input
  if(!p1.cpu){
    if(keys['KeyA'])p1.x-=p1.spd;if(keys['KeyD'])p1.x+=p1.spd;
    if(keys['KeyW']&&p1.y>=FLOOR_Y-p1.h){p1.vy=-p1.jumpForce;}
    if(keys['KeyF'])attackAction(p1,p2);if(keys['KeyG'])specialAction(p1,p2);
  }
  if(!p2.cpu){
    if(keys['ArrowLeft'])p2.x-=p2.spd;if(keys['ArrowRight'])p2.x+=p2.spd;
    if(keys['ArrowUp']&&p2.y>=FLOOR_Y-p2.h){p2.vy=-p2.jumpForce;}
    if(keys['KeyK'])attackAction(p2,p1);if(keys['KeyL'])specialAction(p2,p1);
  } else {
    cpuBrain(p2,p1);
  }

  // Physics
  for(const f of [p1,p2]){
    f.vy+=.55;f.y+=f.vy;
    if(f.y>=FLOOR_Y-f.h){f.y=FLOOR_Y-f.h;f.vy=0;}
    f.x=Math.max(30,Math.min(W-30,f.x));
    if(f.hitStun>0)f.hitStun--;
    // Face opponent
    if(!p1.cpu||!p2.cpu){
      const opp=f===p1?p2:p1;
      f.facing=Math.sign(opp.x-f.x);
    }
    // Attack timer
    if(f.attackTimer>0){f.attackTimer--;
      if(f.attackTimer===12)resolveHit(f,f===p1?p2:p1,f.str,false);
      if(f.attackTimer<=0)f.attackActive=false;
    }
    if(f.specialTimer>0){f.specialTimer--;
      if(f.specialTimer===22)resolveHit(f,f===p1?p2:p1,f.str*1.8,true);
      if(f.specialTimer<=0)f.specialActive=false;
    }
    f.animTimer++;if(f.animTimer>6){f.animTimer=0;f.animFrame=(f.animFrame+1)%4;}
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.2;p.life--;p.vx*=.9;
    if(p.life<=0)particles.splice(i,1);
  }
  for(let i=hitFlashes.length-1;i>=0;i--){hitFlashes[i].life--;if(hitFlashes[i].life<=0)hitFlashes.splice(i,1);}

  // HP bounds
  p1.hp=Math.max(0,p1.hp);p2.hp=Math.max(0,p2.hp);

  // HUD update
  document.getElementById('p1fill').style.width=(p1.hp/p1.maxHp*100)+'%';
  document.getElementById('p2fill').style.width=(p2.hp/p2.maxHp*100)+'%';
  document.getElementById('p1hp').textContent=Math.round(p1.hp);
  document.getElementById('p2hp').textContent=Math.round(p2.hp);

  // Round end
  if(p1.hp<=0||p2.hp<=0){
    roundOver=true;
    if(p1.hp<=0)p2Wins++;else p1Wins++;
    if(p1Wins>=2||p2Wins>=2){
      setTimeout(()=>{
        document.getElementById('goTitle').textContent=p1Wins>=2?'Player 1 Wins!':'Player 2 Wins!';
        document.getElementById('goMsg').textContent=`Score: ${p1Wins} - ${p2Wins}`;
        document.getElementById('gameOver').style.display='flex';
        document.getElementById('hud').style.display='none';
      },1200);
    } else {
      round++;document.getElementById('rndNum').textContent=round;
      setTimeout(()=>resetRound(),1500);
    }
  }
}

function drawFighter(f,isP1){
  ctx.save();ctx.translate(f.x,f.y);
  if(f.facing===-1)ctx.scale(-1,1);
  const flash=f.hitStun>0&&Math.floor(Date.now()/80)%2===0;
  if(flash){ctx.restore();return;}

  // Shadow
  ctx.fillStyle='rgba(0,0,0,.35)';ctx.beginPath();ctx.ellipse(0,f.h+4,f.w*.6,5,0,0,Math.PI*2);ctx.fill();

  // Body glow
  ctx.shadowColor=f.col;ctx.shadowBlur=isP1?12:10;

  // Legs (walk anim)
  const legAnim=Math.sin(f.animFrame/4*Math.PI*2)*8;
  ctx.fillStyle=f.col;
  ctx.fillRect(-6,f.h*.55,10,f.h*.45+legAnim);
  ctx.fillRect(-2,f.h*.55,10,f.h*.45-legAnim);

  // Body
  ctx.fillRect(-f.w/2,f.h*.15,f.w,f.h*.45);

  // Head
  ctx.fillStyle=f.col;ctx.fillRect(-f.w*.35,0,f.w*.7,f.h*.2);
  ctx.fillStyle='#0f172a';ctx.fillRect(-f.w*.15,f.h*.03,f.w*.12,f.h*.08); // eye L
  ctx.fillRect(f.w*.03,f.h*.03,f.w*.12,f.h*.08); // eye R
  ctx.fillStyle=f.col;ctx.fillStyle='rgba(255,255,255,.5)';
  ctx.fillRect(-f.w*.15,f.h*.03,f.w*.12/2,f.h*.08/2);

  // Attack arm
  if(f.attackActive||f.specialActive){
    ctx.fillStyle=f.col;
    const armX=f.w*.5+(f.attackActive?18:28);
    const armY=f.h*.3;
    ctx.fillRect(f.w*.4,armY,armX-f.w*.4,7);
    // Fist
    ctx.beginPath();ctx.arc(armX,armY+3.5,8,0,Math.PI*2);
    ctx.fillStyle=f.specialActive?'#fff':f.col;
    if(f.specialActive){ctx.shadowColor='#fff';ctx.shadowBlur=20;}
    ctx.fill();
  } else {
    ctx.fillStyle=f.col;ctx.fillRect(-f.w*.5,f.h*.2,7,f.h*.3);ctx.fillRect(f.w*.4,f.h*.2,7,f.h*.3);
  }
  ctx.restore();ctx.shadowBlur=0;
}

function draw(){
  // Background
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#0d1117');bg.addColorStop(1,'#1a0a2e');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // Crowd dots (bg atmosphere)
  if(!isLowEnd){
    for(let i=0;i<50;i++){
      const seed=(i*3737)%1000;
      ctx.fillStyle=`rgba(${60+seed%100},${60+((seed*3)%80)},${120+seed%80},.5)`;
      ctx.fillRect((seed*7)%W,(seed*13)%80+H*.25,3,5);
    }
  }

  // Arena floor
  const floorGrad=ctx.createLinearGradient(0,FLOOR_Y,0,FLOOR_Y+50);
  floorGrad.addColorStop(0,'#1e1b4b');floorGrad.addColorStop(1,'#0d0b24');
  ctx.fillStyle=floorGrad;ctx.fillRect(0,FLOOR_Y,W,H-FLOOR_Y);
  // Floor lines
  ctx.strokeStyle='rgba(167,139,250,.15)';ctx.lineWidth=1;
  for(let i=0;i<W;i+=40){ctx.beginPath();ctx.moveTo(i,FLOOR_Y);ctx.lineTo(i,H);ctx.stroke();}

  // Particles
  for(const p of particles){
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=p.col;ctx.globalAlpha=p.life/20;ctx.fill();
    ctx.globalAlpha=1;
  }

  // Fighters
  drawFighter(p1,true);drawFighter(p2,false);

  // Hit flashes
  for(const hf of hitFlashes){
    const alpha=hf.life/10;
    ctx.fillStyle=hf.col;ctx.globalAlpha=alpha;
    ctx.font=`bold 16px Segoe UI`;ctx.textAlign='center';
    ctx.fillText(hf.txt,hf.x,hf.y);
    ctx.globalAlpha=1;
  }

  // Round over msg
  if(roundOver){
    ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fbbf24';ctx.font='bold 32px Segoe UI';ctx.textAlign='center';
    const winner=p1.hp<=0?(gameMode==='1p'?'CPU Wins!':'P2 Wins!'):'P1 Wins!';
    ctx.fillText(winner,W/2,H/2-10);
    ctx.fillStyle='#94a3b8';ctx.font='16px Segoe UI';
    ctx.fillText(`Score: ${p1Wins} - ${p2Wins}`,W/2,H/2+20);
  }
}

(function(){if(!('ontouchstart' in window)&&!navigator.maxTouchPoints)return;const K=keys;function proc(t,v){const r=t.clientX/W;if(r<.2){K.KeyA=K.ArrowLeft=v;}else if(r>.8){K.KeyD=K.ArrowRight=v;}else if(r<.5){K.KeyW=K.ArrowUp=v;}else{K.KeyF=v;}}canvas.addEventListener('touchstart',e=>{e.preventDefault();for(const t of e.changedTouches)proc(t,true);},{passive:false});canvas.addEventListener('touchmove',e=>{e.preventDefault();K.KeyA=K.ArrowLeft=K.KeyD=K.ArrowRight=K.KeyW=K.ArrowUp=K.KeyF=false;for(const t of e.touches)proc(t,true);},{passive:false});canvas.addEventListener('touchend',e=>{e.preventDefault();K.KeyA=K.ArrowLeft=K.KeyD=K.ArrowRight=K.KeyW=K.ArrowUp=K.KeyF=false;for(const t of e.touches)proc(t,true);},{passive:false});})();
function loop(){try{update();}catch(e){console.error('[pixel-duel-3d]',e);}try{draw();}catch(e){console.error('[pixel-duel-3d draw]',e);}requestAnimationFrame(loop);}
loop();

// ===== ONLINE MULTIPLAYER =====
const MP_WORKER='https://germ-fun.kennardxia.workers.dev';const MP_GAME='pixelduel';
let mpWs=null,mpPlayerId=null,mpPeers={},mpConnected=false,mpSendTimer=0;
function openMultiplayer(){
  let ov=document.getElementById('mpOverlay');
  if(!ov){
    ov=document.createElement('div');ov.id='mpOverlay';
    ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:150;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.2rem;backdrop-filter:blur(12px)';
    ov.innerHTML='<h2 style="font-size:1.8rem;font-weight:900;color:#ef4444">🌐 Online Duel</h2><p style="color:#64748b">1v1 fighter — best of 3 rounds</p><div style="display:flex;gap:1rem;flex-wrap:wrap;justify-content:center"><div style="background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:1.2rem;text-align:center;min-width:160px"><div style="font-size:.7rem;color:#64748b;margin-bottom:.6rem;text-transform:uppercase;letter-spacing:.05em">Create Room</div><button onclick="mpCreate()" style="background:linear-gradient(135deg,#ef4444,#ef4444aa);border:none;color:#fff;padding:.6rem 1.4rem;border-radius:10px;font-weight:800;cursor:pointer">+ Create</button><div id="mpCode" style="margin-top:.8rem;font-size:1.6rem;font-weight:900;color:#f59e0b;letter-spacing:.2em;display:none"></div></div><div style="background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:1.2rem;text-align:center;min-width:160px"><div style="font-size:.7rem;color:#64748b;margin-bottom:.6rem;text-transform:uppercase;letter-spacing:.05em">Join Room</div><input id="mpCodeInput" maxlength="6" placeholder="XXXXXX" style="background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.15);color:#e2e8f0;padding:.5rem .8rem;border-radius:8px;font-size:1rem;width:120px;text-align:center;text-transform:uppercase"><br><br><button onclick="mpJoin()" style="background:linear-gradient(135deg,#ef4444,#ef4444aa);border:none;color:#fff;padding:.6rem 1.4rem;border-radius:10px;font-weight:800;cursor:pointer">→ Join</button></div></div><div id="mpStatus" style="font-size:.82rem;color:#94a3b8"></div><div id="mpPlayers" style="font-size:.78rem;color:#64748b"></div><button onclick="document.getElementById(\'mpOverlay\').style.display=\'none\'" style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#94a3b8;padding:.5rem 1.2rem;border-radius:10px;cursor:pointer;margin-top:.4rem">✕ Close</button>';
    document.body.appendChild(ov);
  }else{ov.style.display='flex';}
}
async function mpCreate(){
  setMpStatus('Creating room…');
  try{const r=await fetch(MP_WORKER+'/room/create?game='+MP_GAME,{method:'POST'});if(!r.ok)throw 0;const {code}=await r.json();document.getElementById('mpCode').textContent=code;document.getElementById('mpCode').style.display='block';setMpStatus('Share code: '+code);mpConnect(code);}catch{setMpStatus('⚠ Server unreachable. Play offline.');}
}
function mpJoin(){const c=(document.getElementById('mpCodeInput').value||'').trim().toUpperCase();if(c.length!==6){setMpStatus('Enter a 6-character room code');return;}mpConnect(c);}
function mpConnect(code){
  setMpStatus('Connecting…');
  if(mpWs){try{mpWs.close();}catch{}}
  try{
    mpWs=new WebSocket(MP_WORKER.replace('https','wss')+'/room/'+code+'/ws?game='+MP_GAME);
    mpWs.onopen=()=>setMpStatus('Connected — room '+code);
    mpWs.onclose=()=>{mpConnected=false;mpWs=null;mpPeers={};setMpStatus('Disconnected');};
    mpWs.onerror=()=>setMpStatus('⚠ Connection failed');
    mpWs.onmessage=(ev)=>{
      let d;try{d=JSON.parse(ev.data);}catch{return;}
      if(!d||typeof d!=='object')return;
      if(d.type==='welcome'){mpPlayerId=d.id;mpConnected=true;setMpStatus('✓ In room — Player '+d.count);setMpPlayerCount(d.count);const ov=document.getElementById('mpOverlay');if(ov)ov.style.display='none';startGame('1p');}
      else if(d.type==='join'){setMpPlayerCount(d.count);}
      else if(d.type==='leave'){delete mpPeers[d.id];}
      else if(d.type==='state'&&d.from&&d.from!==mpPlayerId){mpPeers[d.from]={x:+d.x||0,y:+d.y||0,hp:Math.max(0,+d.hp||0),facing:+d.facing||1};}
    };
  }catch{setMpStatus('⚠ WebSocket unavailable');}
}
function setMpStatus(m){const el=document.getElementById('mpStatus');if(el)el.textContent=m;}
function setMpPlayerCount(n){const el=document.getElementById('mpPlayers');if(el)el.textContent='Players in room: '+n;}
const _mpOrigdraw=draw;
draw=function(){
  _mpOrigdraw();
  if(mpConnected&&mpWs&&mpWs.readyState===1){mpSendTimer++;if(mpSendTimer>=3){mpSendTimer=0;try{mpWs.send(JSON.stringify({type:'state',x:p1?p1.x:0,y:p1?p1.y:0,hp:p1?p1.hp:100,facing:p1?p1.facing:1}));}catch{}}}
  if(!mpConnected||!Object.keys(mpPeers).length)return;
  let _gi=0,_yOff=0;
  for(const _id in mpPeers){
    const _p=mpPeers[_id];_gi++;
    ctx.save();
    ctx.globalAlpha=0.85;
    const _tw=110,_th=30;
    const _tx=canvas.width-_tw-6,_ty=6+_yOff;
    ctx.fillStyle='rgba(0,0,0,.55)';ctx.beginPath();
    ctx.roundRect?ctx.roundRect(_tx,_ty,_tw,_th,6):ctx.rect(_tx,_ty,_tw,_th);ctx.fill();
    ctx.strokeStyle='#ef4444';ctx.lineWidth=1.5;
    ctx.roundRect?ctx.roundRect(_tx,_ty,_tw,_th,6):ctx.rect(_tx,_ty,_tw,_th);ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold 10px Segoe UI';ctx.textAlign='left';ctx.textBaseline='middle';
    const _score=_p.score!==undefined?_p.score:(_p.credits||0);
    ctx.fillText('🌐 P'+(_gi+1)+' — '+_score,_tx+6,_ty+_th/2);
    if(typeof _p.hp==='number'){
      ctx.fillStyle='rgba(255,255,255,.2)';ctx.fillRect(_tx+6,_ty+_th-5,_tw-12,3);
      ctx.fillStyle='#ef4444';ctx.fillRect(_tx+6,_ty+_th-5,(_tw-12)*Math.max(0,Math.min(1,_p.hp/100)),3);
    }
    ctx.restore();
    _yOff+=_th+4;
  }
};
</script>
